<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachschlagewerk</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Philosophie">
<style>
:root{--bg:#f7f6f2;--panel:#fff;--ink:#1c1b18;--muted:#6b6862;--line:#e7e4dc;
  --brand:#3b6e58;--brandink:#fff;--soft:#eef0ee;--gold:#c79a2b;
  --shadow:0 8px 24px rgba(40,30,20,.07);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.55;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:10;background:rgba(247,246,242,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:920px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:20px;
  background:linear-gradient(150deg,var(--brand),#0000),var(--brand);color:#fff;box-shadow:var(--shadow)}
.ttl b{font-size:17px;font-weight:800}
.ttl span{display:block;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.tabs button{font:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:999px;padding:7px 14px;cursor:pointer}
.tabs button.active{color:var(--brandink);background:var(--brand)}
main{max-width:920px;margin:0 auto;padding:18px 16px 70px}
.view{display:none}.view.active{display:block}
.search{width:100%;font:inherit;font-size:15px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:14px}
.search:focus{outline:none;border-color:var(--brand)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer}
.chip.active{color:var(--brandink);background:var(--brand);border-color:transparent}
.catblock{margin-bottom:26px}
.catblock h2{font-size:20px;margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid var(--line)}
.catblock h2 .ic{margin-right:6px}
.article{background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:13px;padding:14px 18px;margin-bottom:14px;font-size:14.5px;color:#33312c}
.article p{margin:0 0 9px}.article p:last-child{margin:0}.article b{color:var(--ink)}
.factlabel{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:4px 0 8px}
.entry{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.entry .q{font-weight:700;font-size:15px}
.entry .ans{margin-top:4px;font-size:14px}
.entry .ans b2{}
.entry .ans .lab{color:var(--brand);font-weight:700}
.entry .fb{margin-top:6px;font-size:14px;color:#3a3833}
.entry .fb b{color:var(--ink)}
.count{color:var(--muted);font-size:13px;margin-bottom:14px}
.src{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.src b{font-size:15px}
.src p{margin:3px 0 0;color:var(--muted);font-size:14px}
.lead{color:var(--muted);max-width:640px;margin:0 0 16px}
.iframe-wrap{border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);background:var(--panel)}
.iframe-wrap iframe{width:100%;height:78vh;border:0;display:block}
.empty{color:var(--muted);padding:30px 0;text-align:center}
footer{max-width:920px;margin:0 auto;padding:0 16px 40px;color:var(--muted);font-size:12px;text-align:center}
@media(max-width:560px){.hd{padding:10px 12px}.tabs{margin-left:0;width:100%}main{padding:14px 12px 60px}}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="logo" id="logo"></div>
    <div class="ttl"><b id="brand"></b><span>Nachschlagewerk</span></div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>
<main>
  <section class="view active" id="v-look">
    <input class="search" id="search" placeholder="Suchen … (Begriff, Antwort, Stichwort)">
    <div class="chips" id="chips"></div>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </section>
  <section class="view" id="v-aroma">
    <p class="lead">Das interaktive Aromarad – klick dich durch Kategorien und Aromen.</p>
    <div class="iframe-wrap"><iframe src="aromarad.html" title="Aromarad" loading="lazy"></iframe></div>
  </section>
  <section class="view" id="v-src">
    <p class="lead">Wo findest du mehr? Empfehlenswerte, verlässliche Quellen zum Vertiefen.</p>
    <div id="srclist"></div>
  </section>
</main>
<footer id="foot"></footer>
<script>
const APP={"title": "Philosophie", "brand": "Philo<b>sophie</b>", "color": "#3b6e58", "ic": "🏛", "aroma": false, "order": ["Überblick & Teilgebiete", "Logik & Argumentation", "Antike", "Mittelalter", "Rationalismus & Empirismus", "Kant", "Politische Philosophie", "19. Jahrhundert", "20. Jahrhundert", "Nassim Taleb", "Surowiecki", "Epiktet & Stoa", "Viktor Frankl", "J. S. Mill", "Michael Sandel", "Epikur", "C. S. Lewis", "Hayek", "Wittgenstein", "Hannah Arendt", "Spinoza", "Marc Aurel", "Aristoteles", "Putnam (Sozialkapital)", "Veblen", "Byung-Chul Han", "Hartmut Rosa", "Tocqueville", "Nozick", "Stoa", "Sokrates/Platon", "Hegel", "Camus"], "icons": {"Überblick & Teilgebiete": "🗺️", "Logik & Argumentation": "🧩", "Antike": "🏛️", "Mittelalter": "⛪", "Rationalismus & Empirismus": "🧠", "Kant": "🌉", "Politische Philosophie": "⚖️", "19. Jahrhundert": "🎭", "20. Jahrhundert": "🌀", "Nassim Taleb": "🦢", "Surowiecki": "🐝", "Epiktet & Stoa": "🏛️", "Stoa": "🏛️", "Viktor Frankl": "🕯️", "J. S. Mill": "🗽", "Michael Sandel": "🎓", "Epikur": "🌿", "C. S. Lewis": "✝️", "Hayek": "📉", "Wittgenstein": "🪜", "Hannah Arendt": "🌍", "Spinoza": "🌌", "Marc Aurel": "🏛️", "Aristoteles": "📜", "Putnam (Sozialkapital)": "🤝", "Veblen": "💎", "Byung-Chul Han": "📱", "Hartmut Rosa": "⏳", "Tocqueville": "🗳️", "Nozick": "🏴", "Sokrates/Platon": "🏺", "Hegel": "🌀", "Nietzsche": "⚡", "Camus": "🎭"}, "entries": [{"cat": "Überblick & Teilgebiete", "q": "Welche Disziplin der Philosophie beschäftigt sich mit der Frage, was wir wissen können und wie Wissen entsteht?", "ans": "Erkenntnistheorie", "fb": "Die <b>Erkenntnistheorie</b> (Epistemologie) untersucht Ursprung, Umfang und Grenzen des Wissens."}, {"cat": "Überblick & Teilgebiete", "q": "Womit befasst sich die Metaphysik in erster Linie?", "ans": "Mit den letzten Gründen und der Natur des Seins", "fb": "Die <b>Metaphysik</b> fragt nach dem Sein als solchem, nach Substanz, Ursache und letzten Gründen."}, {"cat": "Überblick & Teilgebiete", "q": "Welches Teilgebiet untersucht das Schöne und die Kunst?", "ans": "Ästhetik", "fb": "Die <b>Ästhetik</b> ist die Theorie des Schönen, der sinnlichen Wahrnehmung und der Kunst."}, {"cat": "Überblick & Teilgebiete", "q": "Die Frage 'Was soll ich tun?' ordnet Kant welcher philosophischen Disziplin zu?", "ans": "Ethik", "fb": "'Was soll ich tun?' ist nach Kant die Leitfrage der <b>Ethik</b> (praktische Philosophie)."}, {"cat": "Überblick & Teilgebiete", "q": "Die Ontologie ist ein Teilbereich der Metaphysik und fragt nach dem Sein des Seienden.", "ans": "Wahr", "fb": "Die <b>Ontologie</b> als Lehre vom Sein gilt als Kernbereich der Metaphysik."}, {"cat": "Überblick & Teilgebiete", "q": "Die Ethik untersucht primär die formalen Regeln gültigen Schließens.", "ans": "Falsch", "fb": "Das ist Aufgabe der <b>Logik</b>; die Ethik fragt nach gutem und richtigem Handeln."}, {"cat": "Überblick & Teilgebiete", "q": "Welcher Begriff gehört NICHT zu den klassischen Teilgebieten der theoretischen Philosophie?", "ans": "Tugendlehre", "fb": "Die <b>Tugendlehre</b> gehört zur praktischen Philosophie, die übrigen zur theoretischen."}, {"cat": "Überblick & Teilgebiete", "q": "Ordne Disziplin → Leitfrage zu.", "ans": "Erkenntnistheorie ↔ Was kann ich wissen?; Ethik ↔ Was soll ich tun?; Ästhetik ↔ Was ist schön?; Metaphysik ↔ Was ist das Sein?", "fb": "Diese Zuordnung folgt den klassischen Leitfragen der Teilgebiete."}, {"cat": "Überblick & Teilgebiete", "q": "Die Lehre vom Sein des Seienden heißt ___ .", "ans": "Ontologie", "fb": "Die <b>Ontologie</b> ist der Kernbereich der Metaphysik."}, {"cat": "Überblick & Teilgebiete", "q": "Welche der folgenden zählen zur praktischen Philosophie?", "ans": "Ethik, Politische Philosophie, Rechtsphilosophie", "fb": "<b>Ethik, politische und Rechtsphilosophie</b> gehören zur praktischen Philosophie; Logik und Ontologie zur theoretischen."}, {"cat": "Überblick & Teilgebiete", "q": "Die Frage 'Was ist der Mensch?' fasst nach Kant die anderen Grundfragen zusammen und gehört zur:", "ans": "Anthropologie", "fb": "Kant ordnet 'Was ist der Mensch?' der philosophischen <b>Anthropologie</b> zu."}, {"cat": "Überblick & Teilgebiete", "q": "Welche Disziplin untersucht systematisch die Grundlagen und Methoden der Wissenschaften?", "ans": "Wissenschaftstheorie", "fb": "Die <b>Wissenschaftstheorie</b> reflektiert Methoden, Begriffe und Geltungsansprüche der Wissenschaften."}, {"cat": "Überblick & Teilgebiete", "q": "Die politische Philosophie gehört zur praktischen Philosophie.", "ans": "Wahr", "fb": "Als Lehre vom gerechten Zusammenleben zählt sie zur <b>praktischen</b> Philosophie."}, {"cat": "Logik & Argumentation", "q": "Ein Argument, das eine Person statt ihrer Aussage angreift, ist ein …", "ans": "Ad-hominem-Argument", "fb": "Beim <b>Ad-hominem</b>-Fehlschluss wird die Person statt des Arguments angegriffen."}, {"cat": "Logik & Argumentation", "q": "Wenn man die Position des Gegners verzerrt darstellt, um sie leichter zu widerlegen, begeht man einen …", "ans": "Strohmann-Fehlschluss", "fb": "Der <b>Strohmann-Fehlschluss</b> bekämpft eine verfälschte, schwächere Version der Gegenposition."}, {"cat": "Logik & Argumentation", "q": "Ein Argument heißt 'gültig', wenn …", "ans": "die Konklusion zwingend aus den Prämissen folgt", "fb": "<b>Gültigkeit</b> betrifft nur die Form: Bei wahren Prämissen muss die Konklusion wahr sein."}, {"cat": "Logik & Argumentation", "q": "Ein Argument ist 'schlüssig' (sound), wenn es …", "ans": "gültig ist UND wahre Prämissen hat", "fb": "Ein <b>schlüssiges</b> Argument ist gültig und hat zugleich wahre Prämissen."}, {"cat": "Logik & Argumentation", "q": "Ein gültiges Argument kann falsche Prämissen und dennoch eine wahre Konklusion haben.", "ans": "Wahr", "fb": "Gültigkeit garantiert nur: Wenn die Prämissen wahr sind, ist die Konklusion wahr — sie kann aber zufällig wahr sein."}, {"cat": "Logik & Argumentation", "q": "Bei der Deduktion folgt die Konklusion zwingend aus den Prämissen.", "ans": "Wahr", "fb": "Die <b>Deduktion</b> ist wahrheitserhaltend: Aus wahren Prämissen folgt notwendig eine wahre Konklusion."}, {"cat": "Logik & Argumentation", "q": "Induktive Schlüsse sind logisch zwingend und niemals falsch.", "ans": "Falsch", "fb": "<b>Induktion</b> verallgemeinert von Einzelfällen; ihre Konklusion ist nur wahrscheinlich, nicht zwingend."}, {"cat": "Logik & Argumentation", "q": "Der Schluss 'Alle bisher beobachteten Schwäne sind weiß, also sind alle Schwäne weiß' ist ein Beispiel für …", "ans": "Induktion", "fb": "Die Verallgemeinerung von Einzelfällen auf eine Allaussage ist klassische <b>Induktion</b>."}, {"cat": "Logik & Argumentation", "q": "'Entweder du bist für uns oder gegen uns' ist ein typisches Beispiel für …", "ans": "falsches Dilemma", "fb": "Das <b>falsche Dilemma</b> reduziert die Optionen künstlich auf zwei, obwohl es mehr gibt."}, {"cat": "Logik & Argumentation", "q": "Ein Argument, dessen Konklusion bereits in einer Prämisse vorausgesetzt wird, ist ein …", "ans": "Zirkelschluss", "fb": "Beim <b>Zirkelschluss</b> (petitio principii) setzt man das Zu-Beweisende schon voraus."}, {"cat": "Logik & Argumentation", "q": "Ordne Fehlschluss → Beschreibung zu.", "ans": "Ad hominem ↔ Angriff auf die Person statt das Argument; Strohmann ↔ Verzerrte Wiedergabe der Gegenposition; Zirkelschluss ↔ Konklusion steckt schon in der Prämisse; Falsches Dilemma ↔ Künstliche Reduktion auf zwei Optionen", "fb": "Jede Zuordnung benennt das definierende Merkmal des Fehlschlusses."}, {"cat": "Logik & Argumentation", "q": "Welcher Begriff gehört NICHT zu den informellen Fehlschlüssen?", "ans": "Modus ponens", "fb": "Der <b>Modus ponens</b> ist eine gültige Schlussregel, kein Fehlschluss."}, {"cat": "Logik & Argumentation", "q": "Die gültige Schlussform 'Wenn p, dann q; p; also q' heißt ___ .", "ans": "modus ponens", "fb": "Der <b>Modus ponens</b> ist eine grundlegende gültige Schlussregel."}, {"cat": "Logik & Argumentation", "q": "Die Schlussform 'Wenn p, dann q; nicht q; also nicht p' heißt ___ .", "ans": "modus tollens", "fb": "Der <b>Modus tollens</b> schließt von der Verneinung des Konsequens auf die des Antezedens."}, {"cat": "Logik & Argumentation", "q": "Welche der folgenden sind informelle Fehlschlüsse?", "ans": "Appell an die Autorität, Dammbruchargument, Naturalistischer Fehlschluss", "fb": "Autoritätsappell, Dammbruch und naturalistischer Fehlschluss sind Fehlschlüsse; modus ponens/tollens sind gültig."}, {"cat": "Logik & Argumentation", "q": "Der naturalistische Fehlschluss besteht laut G. E. Moore darin, …", "ans": "das Gute mit natürlichen Eigenschaften gleichzusetzen", "fb": "Moore kritisiert, das <b>Gute</b> einfach mit natürlichen Eigenschaften zu identifizieren."}, {"cat": "Antike", "q": "Wer gilt als Begründer der abendländischen Ethik und prägte die Methode des kritischen Fragens?", "ans": "Sokrates", "fb": "<b>Sokrates</b> stellte das ethische Fragen ins Zentrum und entwickelte die dialogische Methode."}, {"cat": "Antike", "q": "Welche Methode des hartnäckigen Nachfragens ist mit Sokrates verbunden?", "ans": "Mäeutik", "fb": "Die <b>Mäeutik</b> ('Hebammenkunst') hilft dem Gesprächspartner, Einsichten selbst zu gebären."}, {"cat": "Antike", "q": "Platons Ideenlehre besagt, dass …", "ans": "die Ideen das wahre, unveränderliche Sein bilden", "fb": "Für Platon sind die <b>Ideen</b> die wahren, ewigen Urbilder; die Sinnendinge nur ihre Abbilder."}, {"cat": "Antike", "q": "In Platons Höhlengleichnis stehen die Schatten an der Wand für …", "ans": "die trügerische Sinnenwelt", "fb": "Die <b>Schatten</b> symbolisieren die täuschende Welt der Sinneserscheinungen."}, {"cat": "Antike", "q": "Wofür steht die Sonne in Platons Höhlengleichnis?", "ans": "Die Idee des Guten", "fb": "Die <b>Sonne</b> steht für die Idee des Guten, die alles Erkennen ermöglicht."}, {"cat": "Antike", "q": "Aristoteles bestimmt die höchste Glückseligkeit (eudaimonia) als …", "ans": "Tätigkeit der Seele gemäß der Tugend", "fb": "<b>Eudaimonia</b> ist tugendgemäße Tätigkeit der Seele, vollendet im theoretischen Leben."}, {"cat": "Antike", "q": "Die aristotelische Tugend liegt nach der Mesotes-Lehre …", "ans": "in der Mitte zwischen zwei Extremen", "fb": "Tugend ist nach Aristoteles die <b>Mitte</b> zwischen einem Zuviel und einem Zuwenig."}, {"cat": "Antike", "q": "Welcher Vorsokratiker erklärte das Wasser zum Urgrund (arché) aller Dinge?", "ans": "Thales", "fb": "<b>Thales von Milet</b> gilt als erster Philosoph; er bestimmte das Wasser als Urstoff."}, {"cat": "Antike", "q": "Heraklit ist bekannt für die These …", "ans": "&#x27;Alles fließt&#x27; (panta rhei)", "fb": "Heraklit betont den steten Wandel: <b>panta rhei</b>."}, {"cat": "Antike", "q": "Parmenides vertrat im Gegensatz zu Heraklit, dass …", "ans": "das wahre Sein eines, unveränderlich und unbeweglich ist", "fb": "<b>Parmenides</b> lehrt, das Sein sei eines und unwandelbar; Veränderung sei Schein."}, {"cat": "Antike", "q": "Das oberste Ziel der epikureischen Ethik ist …", "ans": "die Ataraxia (Seelenruhe durch maßvolle Lust)", "fb": "Epikur strebt nach <b>Ataraxia</b>: Seelenruhe durch maßvolle Lust und Schmerzfreiheit."}, {"cat": "Antike", "q": "Das Ideal der Stoa ist das Leben …", "ans": "im Einklang mit der Natur und der Vernunft", "fb": "Die <b>Stoa</b> lehrt das tugendhafte Leben gemäß Natur und Vernunft."}, {"cat": "Antike", "q": "Die antiken Skeptiker (z.B. Pyrrhon) strebten durch Urteilsenthaltung (epoché) nach …", "ans": "Ataraxia (Seelenruhe)", "fb": "Durch die <b>epoché</b> wollten die Skeptiker zur Seelenruhe gelangen."}, {"cat": "Antike", "q": "Aristoteles war ein Schüler Platons.", "ans": "Wahr", "fb": "<b>Aristoteles</b> studierte rund 20 Jahre an Platons Akademie."}, {"cat": "Antike", "q": "Sokrates hat selbst keine philosophischen Schriften hinterlassen.", "ans": "Wahr", "fb": "Unser Wissen über <b>Sokrates</b> stammt v.a. von Platon und Xenophon."}, {"cat": "Antike", "q": "Demokrit vertrat eine atomistische Naturphilosophie.", "ans": "Wahr", "fb": "<b>Demokrit</b> lehrte, alles bestehe aus unteilbaren Atomen im leeren Raum."}, {"cat": "Antike", "q": "Welcher Denker gehört NICHT zu den Vorsokratikern?", "ans": "Seneca", "fb": "<b>Seneca</b> war ein römischer Stoiker der Kaiserzeit, kein Vorsokratiker."}, {"cat": "Antike", "q": "Welcher Begriff gehört NICHT zur Stoa?", "ans": "Ideenlehre", "fb": "Die <b>Ideenlehre</b> stammt von Platon."}, {"cat": "Antike", "q": "Ordne Philosoph → Kernbegriff zu.", "ans": "Platon ↔ Ideenlehre; Aristoteles ↔ Goldene Mitte (Mesotes); Epikur ↔ Ataraxia durch Lust; Heraklit ↔ Panta rhei", "fb": "Jeder Begriff ist das markanteste Lehrstück des Denkers."}, {"cat": "Antike", "q": "Ordne Schule → höchstes Ziel zu.", "ans": "Stoa ↔ Leben gemäß der Vernunft; Epikureismus ↔ Ataraxia durch maßvolle Lust; Skepsis ↔ Urteilsenthaltung (epoché); Aristotelismus ↔ Eudaimonia", "fb": "Die antiken Schulen unterscheiden sich v.a. im Ziel des guten Lebens."}, {"cat": "Antike", "q": "Sortiere die Philosophen chronologisch (früh→spät).", "ans": "Thales → Sokrates → Platon → Aristoteles", "fb": "Thales (~600 v. Chr.), dann Sokrates, sein Schüler Platon und dessen Schüler Aristoteles."}, {"cat": "Antike", "q": "Sortiere chronologisch (früh→spät).", "ans": "Heraklit → Demokrit → Epikur → Marc Aurel", "fb": "Heraklit (~500 v. Chr.), Demokrit (~460 v. Chr.), Epikur (341 v. Chr.), Marc Aurel (121 n. Chr.)."}, {"cat": "Antike", "q": "Sokrates' Eingeständnis lautet sinngemäß: 'Ich weiß, dass ich ___ weiß.'", "ans": "nichts", "fb": "Das <b>sokratische Nichtwissen</b> ist Ausgangspunkt echter Erkenntnissuche."}, {"cat": "Antike", "q": "Platons Schule in Athen hieß ___ .", "ans": "Akademie", "fb": "Platon gründete um 387 v. Chr. die <b>Akademie</b>."}, {"cat": "Antike", "q": "Aristoteles lehrte im ___ (seine Schule in Athen).", "ans": "Lykeion", "fb": "Aristoteles lehrte im <b>Lykeion</b>; seine Schule heißt Peripatos."}, {"cat": "Antike", "q": "In welchem Jahr wurde Sokrates hingerichtet?", "ans": "ca. -399 v. Chr. (±5)", "fb": "<b>Sokrates</b> wurde 399 v. Chr. in Athen hingerichtet."}, {"cat": "Antike", "q": "In welchem Jahr starb Aristoteles?", "ans": "ca. -322 v. Chr. (±5)", "fb": "<b>Aristoteles</b> starb 322 v. Chr."}, {"cat": "Antike", "q": "Welche Aussagen über Platons Politeia treffen zu?", "ans": "Sie entwirft einen idealen Staat, Die Philosophen sollen herrschen, Sie enthält das Höhlengleichnis, Sie gliedert die Seele in drei Teile", "fb": "Die <b>Politeia</b> entwirft den Idealstaat mit Philosophenherrschaft, das Höhlengleichnis und die Dreiteilung der Seele."}, {"cat": "Mittelalter", "q": "Welcher Kirchenvater verband Platonismus mit Christentum und schrieb die 'Bekenntnisse'?", "ans": "Augustinus", "fb": "<b>Augustinus</b> (354–430) prägte das frühe Christentum platonisch und schrieb die 'Confessiones'."}, {"cat": "Mittelalter", "q": "Thomas von Aquin synthetisierte die christliche Lehre vor allem mit der Philosophie von …", "ans": "Aristoteles", "fb": "<b>Thomas von Aquin</b> verband die christliche Theologie mit <b>Aristoteles</b>."}, {"cat": "Mittelalter", "q": "Anselms 'ontologischer Gottesbeweis' schließt von …", "ans": "dem Begriff Gottes als des Größten auf dessen Existenz", "fb": "Anselm folgert aus dem <b>Begriff</b> Gottes seine Existenz."}, {"cat": "Mittelalter", "q": "Im Universalienstreit vertraten die 'Realisten', dass …", "ans": "Allgemeinbegriffe eine eigene Realität besitzen", "fb": "Die <b>Realisten</b> hielten Universalien für real; die Nominalisten sahen bloße Namen."}, {"cat": "Mittelalter", "q": "Die Position, dass Allgemeinbegriffe nur Namen ohne eigene Realität sind, heißt …", "ans": "Nominalismus", "fb": "Der <b>Nominalismus</b> (z.B. Ockham) sieht in Universalien bloße Namen."}, {"cat": "Mittelalter", "q": "Thomas von Aquin formulierte fünf Wege (Gottesbeweise) für Gottes Existenz.", "ans": "Wahr", "fb": "Die <b>quinque viae</b> sind fünf Argumente in Thomas' Summa theologiae."}, {"cat": "Mittelalter", "q": "'Ockhams Rasiermesser' fordert, von konkurrierenden Erklärungen die einfachere zu bevorzugen.", "ans": "Wahr", "fb": "Das <b>Sparsamkeitsprinzip</b>: Entitäten nicht ohne Notwendigkeit vermehren."}, {"cat": "Mittelalter", "q": "Welcher Denker gehört NICHT in die mittelalterliche Philosophie?", "ans": "René Descartes", "fb": "<b>Descartes</b> ist ein neuzeitlicher Rationalist."}, {"cat": "Mittelalter", "q": "Das Sparsamkeitsprinzip heißt nach seinem Urheber ___ Rasiermesser.", "ans": "Ockhams", "fb": "<b>Ockhams Rasiermesser</b> verlangt sparsame Erklärungen."}, {"cat": "Mittelalter", "q": "Ordne Denker → Werk/Beitrag zu.", "ans": "Augustinus ↔ Bekenntnisse (Confessiones); Thomas von Aquin ↔ Summa theologiae; Anselm ↔ Ontologischer Gottesbeweis; Wilhelm von Ockham ↔ Nominalismus / Rasiermesser", "fb": "Jede Zuordnung benennt das Hauptwerk oder den Hauptbeitrag."}, {"cat": "Mittelalter", "q": "In welchem Jahr starb Thomas von Aquin?", "ans": "ca. 1274 n. Chr. (±4)", "fb": "<b>Thomas von Aquin</b> starb 1274."}, {"cat": "Mittelalter", "q": "Sortiere chronologisch (früh→spät).", "ans": "Augustinus → Anselm von Canterbury → Thomas von Aquin → Wilhelm von Ockham", "fb": "Augustinus (354–430), Anselm (1033–1109), Thomas (1225–1274), Ockham (~1287–1347)."}, {"cat": "Rationalismus & Empirismus", "q": "Welcher Satz ist das Fundament der Philosophie Descartes'?", "ans": "&#x27;Ich denke, also bin ich&#x27;", "fb": "<b>Cogito, ergo sum</b> ist Descartes' erste unbezweifelbare Gewissheit."}, {"cat": "Rationalismus & Empirismus", "q": "Descartes' methodischer Zweifel dient dazu, …", "ans": "ein unerschütterliches Fundament des Wissens zu finden", "fb": "Der <b>methodische Zweifel</b> sucht einen absolut sicheren Ausgangspunkt."}, {"cat": "Rationalismus & Empirismus", "q": "Der Rationalismus sieht als wichtigste Quelle sicherer Erkenntnis …", "ans": "die Vernunft", "fb": "Der <b>Rationalismus</b> (Descartes, Spinoza, Leibniz) sieht die <b>Vernunft</b> als Hauptquelle."}, {"cat": "Rationalismus & Empirismus", "q": "Der Empirismus betont, dass alles Wissen …", "ans": "aus der Erfahrung stammt", "fb": "Der <b>Empirismus</b> (Locke, Berkeley, Hume) leitet alles Wissen aus der <b>Erfahrung</b> ab."}, {"cat": "Rationalismus & Empirismus", "q": "Lockes Bild des Geistes bei Geburt ist das einer …", "ans": "tabula rasa (unbeschriebenen Tafel)", "fb": "Locke beschreibt den Geist als <b>tabula rasa</b>, die erst durch Erfahrung beschrieben wird."}, {"cat": "Rationalismus & Empirismus", "q": "Berkeleys Idealismus fasst sich in der Formel …", "ans": "esse est percipi (Sein heißt Wahrgenommenwerden)", "fb": "Für Berkeley gilt <b>esse est percipi</b>: Dinge existieren nur als Wahrgenommenes."}, {"cat": "Rationalismus & Empirismus", "q": "Hume bestreitet, dass wir Kausalität …", "ans": "als notwendige Verknüpfung in der Welt erkennen können", "fb": "Hume: Wir beobachten nur regelmäßige Aufeinanderfolge; die <b>notwendige</b> Verknüpfung ist Gewohnheit."}, {"cat": "Rationalismus & Empirismus", "q": "Spinozas Metaphysik ist berühmt für die Gleichsetzung …", "ans": "von Gott und Natur (deus sive natura)", "fb": "Spinozas <b>deus sive natura</b> identifiziert Gott mit der einen Substanz Natur."}, {"cat": "Rationalismus & Empirismus", "q": "Leibniz nennt die letzten, einfachen, fensterlosen Substanzen …", "ans": "Monaden", "fb": "Die <b>Monaden</b> sind bei Leibniz die einfachen Grundsubstanzen in prästabilierter Harmonie."}, {"cat": "Rationalismus & Empirismus", "q": "Descartes vertrat einen Leib-Seele-Dualismus von denkender und ausgedehnter Substanz.", "ans": "Wahr", "fb": "Descartes unterscheidet <b>res cogitans</b> (Geist) und <b>res extensa</b> (Körper)."}, {"cat": "Rationalismus & Empirismus", "q": "Hume gehört zu den großen Vertretern des Rationalismus.", "ans": "Falsch", "fb": "<b>Hume</b> ist Empirist und Skeptiker, kein Rationalist."}, {"cat": "Rationalismus & Empirismus", "q": "Locke, Berkeley und Hume zählen zu den klassischen britischen Empiristen.", "ans": "Wahr", "fb": "Diese drei gelten als Hauptvertreter des <b>britischen Empirismus</b>."}, {"cat": "Rationalismus & Empirismus", "q": "Welcher Denker ist KEIN Rationalist?", "ans": "Locke", "fb": "<b>Locke</b> ist Empirist."}, {"cat": "Rationalismus & Empirismus", "q": "Welcher Begriff passt NICHT zum Empirismus?", "ans": "angeborene Ideen", "fb": "Gerade <b>angeborene Ideen</b> werden vom Empirismus bestritten."}, {"cat": "Rationalismus & Empirismus", "q": "Ordne Denker → Schlüsselbegriff zu.", "ans": "Descartes ↔ Cogito ergo sum; Spinoza ↔ Deus sive natura; Leibniz ↔ Monaden; Locke ↔ Tabula rasa", "fb": "Jeder Begriff ist die markanteste Lehre des Denkers."}, {"cat": "Rationalismus & Empirismus", "q": "Ordne Empirist → These zu.", "ans": "Locke ↔ Geist als unbeschriebene Tafel; Berkeley ↔ Esse est percipi; Hume ↔ Kausalität ist Gewohnheit; Descartes ↔ Methodischer Zweifel", "fb": "Descartes ist hier der Rationalist als Kontrast."}, {"cat": "Rationalismus & Empirismus", "q": "Descartes' Grundsatz lautet 'cogito, ergo ___'.", "ans": "sum", "fb": "<b>Cogito, ergo sum</b> — 'Ich denke, also bin ich'."}, {"cat": "Rationalismus & Empirismus", "q": "Lockes Ausdruck für den 'unbeschriebenen' Geist lautet ___ .", "ans": "tabula rasa", "fb": "Die <b>tabula rasa</b> ist Lockes Bild für den Geist vor aller Erfahrung."}, {"cat": "Rationalismus & Empirismus", "q": "Sortiere die Denker nach Geburtsjahr (früh→spät).", "ans": "Descartes → Spinoza → Locke → Leibniz", "fb": "Descartes (1596), Spinoza (1632), Locke (1632), Leibniz (1646)."}, {"cat": "Rationalismus & Empirismus", "q": "In welchem Jahr wurde René Descartes geboren?", "ans": "ca. 1596 n. Chr. (±4)", "fb": "<b>Descartes</b> lebte 1596–1650."}, {"cat": "Rationalismus & Empirismus", "q": "In welchem Jahr wurde David Hume geboren?", "ans": "ca. 1711 n. Chr. (±4)", "fb": "<b>David Hume</b> lebte 1711–1776."}, {"cat": "Rationalismus & Empirismus", "q": "Welche Aussagen über Humes Philosophie treffen zu?", "ans": "Er war Empirist, Er problematisierte den Kausalitätsbegriff, Er unterschied &#x27;matters of fact&#x27; und &#x27;relations of ideas&#x27;, Er weckte Kant aus dem &#x27;dogmatischen Schlummer&#x27;", "fb": "Hume war Empirist, kritisierte Kausalität und Induktion und beeinflusste Kant maßgeblich."}, {"cat": "Kant", "q": "Womit beschreibt Kant seine 'kopernikanische Wende'?", "ans": "Nicht der Geist richtet sich nach den Dingen, sondern die Dinge nach den Erkenntnisformen des Geistes", "fb": "Kants <b>kopernikanische Wende</b>: Die Gegenstände richten sich nach unseren Anschauungs- und Verstandesformen."}, {"cat": "Kant", "q": "Das 'Ding an sich' (Noumenon) ist bei Kant …", "ans": "prinzipiell unerkennbar", "fb": "Das <b>Ding an sich</b> liegt jenseits unserer Erkenntnis; wir erkennen nur Erscheinungen."}, {"cat": "Kant", "q": "Der kategorische Imperativ lautet: 'Handle nur nach derjenigen Maxime, …'", "ans": "…durch die du zugleich wollen kannst, dass sie ein allgemeines Gesetz werde", "fb": "Die <b>Universalisierbarkeit</b> der Maxime ist das Kriterium des kategorischen Imperativs."}, {"cat": "Kant", "q": "Die 'Zweck-an-sich-Formel' fordert, den Menschen …", "ans": "niemals bloß als Mittel, sondern stets zugleich als Zweck zu behandeln", "fb": "Die <b>Selbstzweckformel</b> verbietet bloße Instrumentalisierung."}, {"cat": "Kant", "q": "Synthetische Urteile a priori sind nach Kant solche, die …", "ans": "das Wissen erweitern und doch allgemein und notwendig gelten", "fb": "<b>Synthetische Urteile a priori</b> erweitern Wissen und gelten dennoch notwendig."}, {"cat": "Kant", "q": "Raum und Zeit sind bei Kant …", "ans": "reine Formen der Anschauung (a priori)", "fb": "<b>Raum und Zeit</b> sind Formen unserer Anschauung, nicht Eigenschaften der Dinge an sich."}, {"cat": "Kant", "q": "Kants drei Kritiken sind 'Kritik der reinen Vernunft', 'Kritik der praktischen Vernunft' und 'Kritik der Urteilskraft'.", "ans": "Wahr", "fb": "Diese drei <b>Kritiken</b> bilden Kants kritisches Hauptwerk."}, {"cat": "Kant", "q": "Für Kant ist der gute Wille das einzige, was uneingeschränkt gut ist.", "ans": "Wahr", "fb": "Kant beginnt die 'Grundlegung' mit dem Satz, nichts sei uneingeschränkt gut als ein <b>guter Wille</b>."}, {"cat": "Kant", "q": "Der kategorische Imperativ ist nach Kant ein hypothetischer (bedingter) Imperativ.", "ans": "Falsch", "fb": "Der <b>kategorische</b> Imperativ gilt unbedingt."}, {"cat": "Kant", "q": "Welcher Begriff gehört NICHT zu Kants Philosophie?", "ans": "Wille zur Macht", "fb": "Der <b>Wille zur Macht</b> stammt von Nietzsche."}, {"cat": "Kant", "q": "Kants oberstes Moralprinzip heißt der ___ Imperativ.", "ans": "kategorische", "fb": "Der <b>kategorische Imperativ</b> ist das unbedingt gültige Sittengesetz."}, {"cat": "Kant", "q": "Das unerkennbare 'Ding an sich' nennt Kant auch das ___ .", "ans": "Noumenon", "fb": "Das <b>Noumenon</b> steht der Erscheinung (Phänomen) gegenüber."}, {"cat": "Kant", "q": "Ordne Kant-Werk → Thema zu.", "ans": "Kritik der reinen Vernunft ↔ Grenzen der Erkenntnis; Kritik der praktischen Vernunft ↔ Moral und Freiheit; Kritik der Urteilskraft ↔ Ästhetik und Teleologie; Grundlegung zur Metaphysik der Sitten ↔ Begründung des kategorischen Imperativs", "fb": "Jede Zuordnung benennt das Hauptthema des Werks."}, {"cat": "Kant", "q": "In welchem Jahr wurde Immanuel Kant geboren?", "ans": "ca. 1724 n. Chr. (±3)", "fb": "<b>Kant</b> wurde 1724 in Königsberg geboren."}, {"cat": "Kant", "q": "In welchem Jahr erschien die erste Auflage der 'Kritik der reinen Vernunft'?", "ans": "ca. 1781 n. Chr. (±3)", "fb": "Die erste Auflage erschien 1781."}, {"cat": "Kant", "q": "Welche Aussagen über den kategorischen Imperativ treffen zu?", "ans": "Er ist unbedingt gültig, Er prüft die Verallgemeinerbarkeit von Maximen, Er gründet auf der Vernunft, nicht auf Neigung", "fb": "Der KI gilt unbedingt, prüft Universalisierbarkeit, gründet in der Vernunft und ist nicht utilitaristisch."}, {"cat": "Politische Philosophie", "q": "Welcher Denker beschrieb den Naturzustand als 'Krieg aller gegen alle' und forderte einen starken Staat (Leviathan)?", "ans": "Hobbes", "fb": "<b>Thomas Hobbes</b> sieht im Naturzustand einen 'bellum omnium contra omnes'."}, {"cat": "Politische Philosophie", "q": "Für John Locke dient der Staat vor allem dem Schutz von …", "ans": "Leben, Freiheit und Eigentum", "fb": "<b>Locke</b> begründet den Staat als Schutz natürlicher Rechte."}, {"cat": "Politische Philosophie", "q": "Rousseaus Gesellschaftsvertrag stützt sich auf den Begriff des/der …", "ans": "volonté générale (Gemeinwillen)", "fb": "Rousseaus <b>volonté générale</b> ist Grundlage legitimer Ordnung."}, {"cat": "Politische Philosophie", "q": "Welches Prinzip Mills besagt, dass Freiheit nur eingeschränkt werden darf, um Schaden für andere zu verhindern?", "ans": "Schadensprinzip", "fb": "Mills <b>Schadensprinzip</b> erlaubt Eingriffe nur zum Schutz anderer."}, {"cat": "Politische Philosophie", "q": "Rawls' Gedankenexperiment zur Begründung gerechter Grundsätze heißt …", "ans": "Schleier des Nichtwissens", "fb": "Hinter dem <b>Schleier des Nichtwissens</b> wählt man Prinzipien, ohne die eigene Position zu kennen."}, {"cat": "Politische Philosophie", "q": "Rawls' Differenzprinzip erlaubt soziale Ungleichheiten nur, wenn sie …", "ans": "den am schlechtesten Gestellten zugutekommen", "fb": "Das <b>Differenzprinzip</b> akzeptiert Ungleichheiten nur, wenn sie den Schwächsten den größten Vorteil bringen."}, {"cat": "Politische Philosophie", "q": "Robert Nozick hält in 'Anarchie, Staat und Utopia' für legitim nur …", "ans": "einen &#x27;Minimalstaat&#x27; (Nachtwächterstaat)", "fb": "<b>Nozick</b> verteidigt libertär einen <b>Minimalstaat</b>."}, {"cat": "Politische Philosophie", "q": "'Gesellschaftsvertrag' bezeichnet die Idee, dass Herrschaft auf Zustimmung der Beherrschten beruht.", "ans": "Wahr", "fb": "Die <b>Kontrakttheorien</b> leiten staatliche Legitimität aus einem gedachten Vertrag ab."}, {"cat": "Politische Philosophie", "q": "Hobbes plädierte für eine möglichst weitgehende Gewaltenteilung.", "ans": "Falsch", "fb": "<b>Hobbes</b> forderte ungeteilte, starke Souveränität."}, {"cat": "Politische Philosophie", "q": "Welcher Denker gehört NICHT zur klassischen Vertragstheorie?", "ans": "Nietzsche", "fb": "<b>Nietzsche</b> ist kein Vertragstheoretiker."}, {"cat": "Politische Philosophie", "q": "Ordne Denker → Schlüsselbegriff zu.", "ans": "Hobbes ↔ Leviathan; Rousseau ↔ Volonté générale; Rawls ↔ Schleier des Nichtwissens; Nozick ↔ Minimalstaat", "fb": "Jeder Begriff ist die zentrale Idee des Denkers."}, {"cat": "Politische Philosophie", "q": "Ordne Werk → Autor zu.", "ans": "Leviathan ↔ Hobbes; Zwei Abhandlungen über die Regierung ↔ Locke; Der Gesellschaftsvertrag ↔ Rousseau; Eine Theorie der Gerechtigkeit ↔ Rawls", "fb": "Jede Zuordnung verbindet ein Hauptwerk mit seinem Autor."}, {"cat": "Politische Philosophie", "q": "Hobbes nennt den Naturzustand einen Krieg ___ (alle/jeden).", "ans": "aller gegen alle", "fb": "Der <b>bellum omnium contra omnes</b> begründet die Notwendigkeit des Staates."}, {"cat": "Politische Philosophie", "q": "Sortiere die Denker nach Geburtsjahr (früh→spät).", "ans": "Hobbes → Locke → Rousseau → Rawls", "fb": "Hobbes (1588), Locke (1632), Rousseau (1712), Rawls (1921)."}, {"cat": "Politische Philosophie", "q": "In welchem Jahr erschien Hobbes' 'Leviathan'?", "ans": "ca. 1651 n. Chr. (±3)", "fb": "Hobbes' <b>Leviathan</b> erschien 1651."}, {"cat": "Politische Philosophie", "q": "In welchem Jahr erschien Rawls' 'Eine Theorie der Gerechtigkeit'?", "ans": "ca. 1971 n. Chr. (±3)", "fb": "Rawls' Werk erschien 1971."}, {"cat": "Politische Philosophie", "q": "Welche Elemente gehören zu Rawls' Gerechtigkeitstheorie?", "ans": "Urzustand, Schleier des Nichtwissens, Prinzip der gleichen Grundfreiheiten, Differenzprinzip", "fb": "Die 'unsichtbare Hand' stammt von Adam Smith, nicht von Rawls."}, {"cat": "19. Jahrhundert", "q": "Welcher Philosoph entwickelte die Dialektik (These–Antithese–Synthese) als Geschichtsdeutung?", "ans": "Hegel", "fb": "<b>Hegel</b> deutet Geschichte als dialektischen Fortgang des Geistes."}, {"cat": "19. Jahrhundert", "q": "Marx 'stellte Hegel vom Kopf auf die Füße', indem er …", "ans": "das materielle Sein als Basis des Bewusstseins ansah", "fb": "Marx' <b>historischer Materialismus</b>: Das Sein bestimmt das Bewusstsein."}, {"cat": "19. Jahrhundert", "q": "Schopenhauers Hauptwerk trägt den Titel …", "ans": "Die Welt als Wille und Vorstellung", "fb": "<b>Die Welt als Wille und Vorstellung</b> deutet die Wirklichkeit als blinden Willen."}, {"cat": "19. Jahrhundert", "q": "Kierkegaard gilt als Wegbereiter des Existenzialismus und betont …", "ans": "die einzelne Existenz und Entscheidung des Individuums", "fb": "<b>Kierkegaard</b> stellt den existierenden Einzelnen ins Zentrum."}, {"cat": "19. Jahrhundert", "q": "Nietzsches Diagnose 'Gott ist tot' meint vor allem …", "ans": "den Verlust des verbindlichen christlich-metaphysischen Sinnhorizonts", "fb": "Mit 'Gott ist tot' beschreibt Nietzsche den <b>Niedergang verbindlicher Werte</b>."}, {"cat": "19. Jahrhundert", "q": "Nietzsches Ideal des sinngebenden, werteschaffenden Menschen heißt …", "ans": "der Übermensch", "fb": "Der <b>Übermensch</b> schafft eigene Werte jenseits überlieferter Moral."}, {"cat": "19. Jahrhundert", "q": "Der klassische Utilitarismus (Bentham, Mill) bewertet Handlungen nach …", "ans": "ihrem Beitrag zum größten Glück der größten Zahl", "fb": "Der <b>Utilitarismus</b> misst Handlungen an ihren Folgen für das Gesamtglück."}, {"cat": "19. Jahrhundert", "q": "Bentham wollte den Nutzen mit einem Kalkül messen; Mill ergänzte dies um …", "ans": "die Unterscheidung höherer und niederer Lust (Qualität)", "fb": "<b>Mill</b> unterschied qualitativ höhere von niederen Lüsten."}, {"cat": "19. Jahrhundert", "q": "Karl Marx schrieb gemeinsam mit Friedrich Engels das 'Kommunistische Manifest'.", "ans": "Wahr", "fb": "Das <b>Kommunistische Manifest</b> (1848) stammt von Marx und Engels."}, {"cat": "19. Jahrhundert", "q": "Schopenhauer war stark von indischer Philosophie (u.a. Upanishaden) beeinflusst.", "ans": "Wahr", "fb": "<b>Schopenhauer</b> rezipierte indische Quellen."}, {"cat": "19. Jahrhundert", "q": "Für Nietzsche ist die christliche Moral eine 'Sklavenmoral'.", "ans": "Wahr", "fb": "Nietzsche kontrastiert <b>Herren-</b> und <b>Sklavenmoral</b>."}, {"cat": "19. Jahrhundert", "q": "Welcher Begriff gehört NICHT zu Nietzsche?", "ans": "Kategorischer Imperativ", "fb": "Der <b>kategorische Imperativ</b> stammt von Kant."}, {"cat": "19. Jahrhundert", "q": "Welcher Denker passt NICHT in die Reihe?", "ans": "Aristoteles", "fb": "<b>Aristoteles</b> ist Antike."}, {"cat": "19. Jahrhundert", "q": "Ordne Denker → Schlüsselbegriff zu.", "ans": "Hegel ↔ Dialektik des Geistes; Marx ↔ Historischer Materialismus; Schopenhauer ↔ Welt als Wille; Nietzsche ↔ Wille zur Macht", "fb": "Jeder Begriff steht für die zentrale Lehre."}, {"cat": "19. Jahrhundert", "q": "Nietzsches Diagnose lautet: 'Gott ist ___ .'", "ans": "tot", "fb": "Mit 'Gott ist tot' beschreibt Nietzsche den Zusammenbruch verbindlicher Werte."}, {"cat": "19. Jahrhundert", "q": "Marx' ökonomisches Hauptwerk heißt 'Das ___ '.", "ans": "Kapital", "fb": "<b>Das Kapital</b> analysiert die kapitalistische Produktionsweise."}, {"cat": "19. Jahrhundert", "q": "Sortiere die Denker nach Geburtsjahr (früh→spät).", "ans": "Hegel → Schopenhauer → Kierkegaard → Nietzsche", "fb": "Hegel (1770), Schopenhauer (1788), Kierkegaard (1813), Nietzsche (1844)."}, {"cat": "19. Jahrhundert", "q": "In welchem Jahr wurde Friedrich Nietzsche geboren?", "ans": "ca. 1844 n. Chr. (±3)", "fb": "<b>Nietzsche</b> lebte 1844–1900."}, {"cat": "19. Jahrhundert", "q": "In welchem Jahr erschien das 'Kommunistische Manifest'?", "ans": "ca. 1848 n. Chr. (±2)", "fb": "Das Manifest erschien 1848."}, {"cat": "19. Jahrhundert", "q": "Welche Begriffe sind zentral für Nietzsche?", "ans": "Wille zur Macht, Ewige Wiederkunft, Umwertung aller Werte, Übermensch", "fb": "Der Schleier des Nichtwissens stammt von Rawls."}, {"cat": "20. Jahrhundert", "q": "Welcher Satz fasst Sartres Existenzialismus zusammen?", "ans": "Die Existenz geht der Essenz voraus", "fb": "Sartres Formel: Der Mensch ist, was er aus sich macht."}, {"cat": "20. Jahrhundert", "q": "Camus deutet das Leben angesichts der Sinnlosigkeit als …", "ans": "absurd", "fb": "Camus' <b>Absurdes</b> entspringt dem Widerspruch zwischen Sinnverlangen und sinnloser Welt."}, {"cat": "20. Jahrhundert", "q": "Heideggers Grundfrage in 'Sein und Zeit' ist die Frage nach …", "ans": "dem Sinn von Sein", "fb": "Heidegger erneuert die <b>Seinsfrage</b>."}, {"cat": "20. Jahrhundert", "q": "Edmund Husserl gilt als Begründer der …", "ans": "Phänomenologie", "fb": "<b>Husserl</b> begründete die <b>Phänomenologie</b>: 'Zu den Sachen selbst'."}, {"cat": "20. Jahrhundert", "q": "Wittgensteins 'Tractatus' endet mit: 'Wovon man nicht sprechen kann, …'", "ans": "…darüber muss man schweigen", "fb": "Der Schlusssatz zieht die Grenze des sinnvoll Sagbaren."}, {"cat": "20. Jahrhundert", "q": "Der späte Wittgenstein erklärt die Bedeutung eines Wortes vor allem durch …", "ans": "seinen Gebrauch in Sprachspielen", "fb": "Bedeutung ist <b>Gebrauch</b> in Sprachspielen."}, {"cat": "20. Jahrhundert", "q": "Poppers Abgrenzungskriterium für Wissenschaft ist die …", "ans": "Falsifizierbarkeit", "fb": "<b>Popper</b>: Eine Theorie ist wissenschaftlich, wenn sie prinzipiell <b>falsifizierbar</b> ist."}, {"cat": "20. Jahrhundert", "q": "Thomas Kuhn beschreibt wissenschaftlichen Fortschritt durch …", "ans": "Paradigmenwechsel (wissenschaftliche Revolutionen)", "fb": "Kuhn deutet Wissenschaftsgeschichte als Abfolge von <b>Paradigmen</b>."}, {"cat": "20. Jahrhundert", "q": "Hannah Arendt prägte angesichts des Eichmann-Prozesses die Formel …", "ans": "&#x27;Banalität des Bösen&#x27;", "fb": "Arendts <b>Banalität des Bösen</b> beschreibt gedankenloses Mitlaufen."}, {"cat": "20. Jahrhundert", "q": "Frege gilt als Mitbegründer der modernen formalen Logik und Sprachphilosophie.", "ans": "Wahr", "fb": "<b>Frege</b> unterschied Sinn und Bedeutung und revolutionierte die Logik."}, {"cat": "20. Jahrhundert", "q": "Sartre vertrat einen strengen Determinismus, der Freiheit leugnet.", "ans": "Falsch", "fb": "<b>Sartre</b> betont radikale <b>Freiheit</b> — der Mensch ist 'zur Freiheit verurteilt'."}, {"cat": "20. Jahrhundert", "q": "Camus illustriert das Absurde im Essay 'Der Mythos des Sisyphos'.", "ans": "Wahr", "fb": "In <b>Der Mythos des Sisyphos</b> entwickelt Camus seine Philosophie des Absurden."}, {"cat": "20. Jahrhundert", "q": "Welcher Denker gehört NICHT zum Existenzialismus?", "ans": "Popper", "fb": "<b>Popper</b> ist Wissenschaftstheoretiker."}, {"cat": "20. Jahrhundert", "q": "Welcher Begriff gehört NICHT zur Wissenschaftstheorie?", "ans": "Sprachspiel", "fb": "Das <b>Sprachspiel</b> stammt aus Wittgensteins Sprachphilosophie."}, {"cat": "20. Jahrhundert", "q": "Ordne Denker → Richtung/Begriff zu.", "ans": "Husserl ↔ Phänomenologie; Wittgenstein ↔ Sprachphilosophie / Sprachspiel; Popper ↔ Falsifikationismus; Sartre ↔ Existenzialismus", "fb": "Jede Zuordnung benennt die zentrale Richtung."}, {"cat": "20. Jahrhundert", "q": "Ordne Werk → Autor zu.", "ans": "Sein und Zeit ↔ Heidegger; Tractatus logico-philosophicus ↔ Wittgenstein; Der Mythos des Sisyphos ↔ Camus; Vita activa ↔ Arendt", "fb": "Jede Zuordnung verbindet ein Hauptwerk mit seinem Autor."}, {"cat": "20. Jahrhundert", "q": "Sartre: Die ___ geht der Essenz voraus.", "ans": "Existenz", "fb": "Diese Formel ist der Kern des atheistischen Existenzialismus."}, {"cat": "20. Jahrhundert", "q": "Poppers Kriterium für Wissenschaftlichkeit heißt ___ .", "ans": "Falsifizierbarkeit", "fb": "<b>Falsifizierbarkeit</b> trennt Wissenschaft von Nicht-Wissenschaft."}, {"cat": "20. Jahrhundert", "q": "Sortiere die Denker nach Geburtsjahr (früh→spät).", "ans": "Husserl → Heidegger → Sartre → Camus", "fb": "Husserl (1859), Heidegger (1889), Sartre (1905), Camus (1913)."}, {"cat": "20. Jahrhundert", "q": "In welchem Jahr erschien Heideggers 'Sein und Zeit'?", "ans": "ca. 1927 n. Chr. (±3)", "fb": "<b>Sein und Zeit</b> erschien 1927."}, {"cat": "20. Jahrhundert", "q": "In welchem Jahr wurde Hannah Arendt geboren?", "ans": "ca. 1906 n. Chr. (±3)", "fb": "<b>Hannah Arendt</b> lebte 1906–1975."}, {"cat": "20. Jahrhundert", "q": "Welche Aussagen über Poppers Wissenschaftstheorie treffen zu?", "ans": "Theorien werden nie endgültig verifiziert, Falsifizierbarkeit ist das Abgrenzungskriterium, Wissenschaft schreitet durch Versuch und Irrtum voran, Bewährte Theorien gelten als vorläufig", "fb": "Popper lehnt sichere Induktion ab; Theorien sind nur vorläufig bewährt."}, {"cat": "Nassim Taleb", "q": "Was bezeichnet Taleb als 'Schwarzen Schwan'?", "ans": "Ein seltenes, kaum vorhersehbares Ereignis mit massiven Folgen", "fb": "Ein <b>Schwarzer Schwan</b> ist selten, vorab unwahrscheinlich, hat enorme Wirkung und wirkt rückblickend 'erklärbar'."}, {"cat": "Nassim Taleb", "q": "Talebs 'Truthahn-Problem' illustriert vor allem …", "ans": "die Gefahr induktiver Schlüsse aus der Vergangenheit", "fb": "Der gefütterte <b>Truthahn</b> schließt aus vielen guten Tagen auf Sicherheit — bis zum Erntedankfest."}, {"cat": "Nassim Taleb", "q": "In Talebs Begriffspaar ist 'Extremistan' der Bereich, in dem …", "ans": "einzelne Extremereignisse das Gesamtbild dominieren", "fb": "In <b>Extremistan</b> bestimmen wenige Extremfälle das Ganze; in <b>Mediokristan</b> mitteln sich Abweichungen aus."}, {"cat": "Nassim Taleb", "q": "Der 'Survivorship Bias' besteht darin, dass …", "ans": "man nur die Erfolgreichen sieht und die Gescheiterten übersieht", "fb": "Beim <b>Survivorship Bias</b> betrachtet man nur die 'Überlebenden' und unterschätzt Risiko und Zufall."}, {"cat": "Nassim Taleb", "q": "'Skin in the Game' fordert, dass Entscheider …", "ans": "an den Folgen ihrer Entscheidungen selbst beteiligt sind", "fb": "<b>Skin in the Game</b>: Wer entscheidet, soll die Risiken selbst mittragen."}, {"cat": "Nassim Taleb", "q": "Mit 'narrativer Verzerrung' meint Taleb die Neigung, …", "ans": "aus Ereignissen nachträglich glatte Ursache-Wirkungs-Geschichten zu basteln", "fb": "Die <b>narrative Verzerrung</b> überstülpt dem Zufall im Nachhinein eine zwingend wirkende Erzählung."}, {"cat": "Nassim Taleb", "q": "In Mediokristan kann ein einzelnes Ereignis den Gesamtdurchschnitt dramatisch verändern.", "ans": "Falsch", "fb": "Gerade in <b>Mediokristan</b> bleiben Einzelfälle harmlos; das kennzeichnet <b>Extremistan</b>."}, {"cat": "Nassim Taleb", "q": "Der Schwarze Schwan erscheint oft erst im Rückblick als 'vorhersehbar'.", "ans": "Wahr", "fb": "Diese rückblickende Scheinerklärbarkeit ist ein Kennzeichen des <b>Schwarzen Schwans</b>."}, {"cat": "Nassim Taleb", "q": "Taleb nennt Systeme, die durch Stress und Unordnung besser werden, 'antifragil'.", "ans": "Wahr", "fb": "<b>Antifragilität</b> geht über Robustheit hinaus: Solche Systeme profitieren von Volatilität."}, {"cat": "Nassim Taleb", "q": "Welcher Begriff stammt NICHT von Taleb?", "ans": "Kategorischer Imperativ", "fb": "Der <b>kategorische Imperativ</b> ist Kants Begriff."}, {"cat": "Nassim Taleb", "q": "Talebs Bereich, in dem Extremereignisse alles dominieren, heißt ___ .", "ans": "Extremistan", "fb": "In <b>Extremistan</b> bestimmen seltene Ausreißer das Gesamtbild."}, {"cat": "Nassim Taleb", "q": "Ordne Talebs Begriff → Bedeutung zu.", "ans": "Schwarzer Schwan ↔ Seltenes Ereignis mit großer Wirkung; Truthahn-Problem ↔ Trügerische Induktion aus der Vergangenheit; Survivorship Bias ↔ Nur Erfolge werden betrachtet; Skin in the Game ↔ Eigenes Risiko der Entscheider", "fb": "Jede Zuordnung gibt die Kernbedeutung wieder."}, {"cat": "Nassim Taleb", "q": "Welche Aussagen treffen auf Talebs Denken zu?", "ans": "Er warnt vor Überschätzung von Prognosen, Er betont die Rolle seltener Ereignisse, Er fordert Skin in the Game, Er kritisiert die narrative Verzerrung", "fb": "Taleb kritisiert gerade die unkritische Anwendung der Normalverteilung in Extremistan."}, {"cat": "Surowiecki", "q": "James Surowieckis Buch trägt den Titel …", "ans": "Die Weisheit der Vielen", "fb": "<b>Die Weisheit der Vielen</b> untersucht, wann Gruppen klüger urteilen als Einzelne."}, {"cat": "Surowiecki", "q": "Welches Beispiel (Galtons Ochse) eröffnet die Idee der Weisheit der Vielen?", "ans": "Die Schätzung des Gewichts eines Ochsen durch eine Menge", "fb": "Bei <b>Galton</b> schätzte der Durchschnitt der Menge das Ochsengewicht erstaunlich genau."}, {"cat": "Surowiecki", "q": "Welche Bedingung gehört NICHT zu Surowieckis vier Voraussetzungen?", "ans": "zentrale Steuerung durch eine Autorität", "fb": "Surowiecki nennt Vielfalt, Unabhängigkeit, Dezentralität und Aggregation — keine zentrale Steuerung."}, {"cat": "Surowiecki", "q": "Welche Gefahr unterläuft die Weisheit der Vielen besonders?", "ans": "Herdenverhalten und Konformitätsdruck", "fb": "<b>Herdenverhalten</b> zerstört die nötige Unabhängigkeit der Urteile."}, {"cat": "Surowiecki", "q": "Nach Surowiecki müssen die Mitglieder unabhängig voneinander urteilen.", "ans": "Wahr", "fb": "<b>Unabhängigkeit</b> verhindert, dass sich Fehler durch Herdenverhalten verstärken."}, {"cat": "Surowiecki", "q": "Welche sind Surowieckis vier Bedingungen für kluge Mengen?", "ans": "Meinungsvielfalt, Unabhängigkeit, Dezentralität, Aggregation", "fb": "Die vier Bedingungen sind Vielfalt, Unabhängigkeit, Dezentralität und Aggregation; Konformität schadet."}, {"cat": "Surowiecki", "q": "Das klassische Beispiel ist die Schätzung des Gewichts eines ___ durch eine Menge (Galton).", "ans": "Ochsen", "fb": "Francis <b>Galton</b> beobachtete, dass der Mittelwert der Schätzungen sehr genau war."}, {"cat": "Epiktet & Stoa", "q": "Epiktets 'Dichotomie der Kontrolle' unterscheidet zwischen …", "ans": "dem, was in unserer Macht steht, und dem, was nicht", "fb": "Manches (Urteile, Handlungen) liegt bei uns, anderes (Ruf, Besitz) nicht."}, {"cat": "Epiktet & Stoa", "q": "Was zählt Epiktet zu dem, was NICHT in unserer Macht steht?", "ans": "unser Ruf und unser Besitz", "fb": "Äußeres wie <b>Ruf, Besitz, Körper</b> liegt nicht in unserer Macht."}, {"cat": "Epiktet & Stoa", "q": "Epiktet war ursprünglich ein Sklave.", "ans": "Wahr", "fb": "<b>Epiktet</b> war als junger Mann Sklave in Rom."}, {"cat": "Epiktet & Stoa", "q": "Nach der Stoa beunruhigen uns nicht die Dinge, sondern unsere Urteile über sie.", "ans": "Wahr", "fb": "Dieser Kernsatz Epiktets verlegt die Ursache des Leids in unsere <b>Bewertungen</b>."}, {"cat": "Epiktet & Stoa", "q": "Epiktets Lehrbuch der Lebenskunst heißt ___ (Handbüchlein).", "ans": "Encheiridion", "fb": "Das <b>Encheiridion</b> fasst Epiktets praktische Stoa zusammen."}, {"cat": "Viktor Frankl", "q": "Viktor Frankls Hauptidee ist, dass der Mensch primär getrieben ist von …", "ans": "dem Streben nach Sinn", "fb": "Frankls <b>Logotherapie</b> sieht den 'Willen zum Sinn' als zentrale Motivation."}, {"cat": "Viktor Frankl", "q": "Frankls 'letzte Freiheit' meint, dass dem Menschen selbst im Leid bleibt: …", "ans": "die Wahl seiner Einstellung", "fb": "Die <b>letzte Freiheit</b> ist die Freiheit, die innere Haltung zum Leid zu wählen."}, {"cat": "Viktor Frankl", "q": "Frankl verarbeitete seine KZ-Erfahrungen im Buch '… trotzdem Ja zum Leben sagen'.", "ans": "Wahr", "fb": "In diesem Buch schildert Frankl die KZ-Erfahrung und die Sinnfrage."}, {"cat": "Viktor Frankl", "q": "Frankls von ihm begründete Therapierichtung heißt ___ .", "ans": "Logotherapie", "fb": "Die <b>Logotherapie</b> stellt die Sinnfrage ins Zentrum."}, {"cat": "J. S. Mill", "q": "Mills 'Schadensprinzip' findet sich in seiner Schrift …", "ans": "Über die Freiheit", "fb": "Das <b>harm principle</b> entfaltet Mill in <b>Über die Freiheit</b>."}, {"cat": "J. S. Mill", "q": "Mit 'Tyrannei der Mehrheit' warnt Mill vor …", "ans": "der Unterdrückung Andersdenkender durch die
