 und niederer Freuden", "fb": "Mill: 'Lieber ein unzufriedener Sokrates als ein zufriedenes Schwein' — geistige Freuden sind höherwertig."}, {"cat": "J. S. Mill", "q": "Mills Diktum lautet sinngemäß: Lieber ein unzufriedener Mensch als ein zufriedenes Schwein.", "ans": "Wahr", "fb": "Mill verteidigt damit die <b>qualitative</b> Höherwertigkeit geistiger Freuden."}, {"cat": "Epikur", "q": "Epikurs 'Tetrapharmakon' (Vierfaches Heilmittel) beginnt klassisch mit dem Satz: …", "ans": "&#x27;Die Gottheit ist nicht zu fürchten&#x27;", "fb": "Das <b>Tetrapharmakon</b> beginnt mit 'Die Gottheit ist nicht zu fürchten', gefolgt von der Furchtlosigkeit vor dem Tod usw."}, {"cat": "Epikur", "q": "Epikur argumentiert, der Tod gehe uns nichts an, da wir, solange wir sind, nicht tot sind, und wenn der Tod da ist, wir nicht mehr sind.", "ans": "Wahr", "fb": "Dieses <b>Todesargument</b> soll die Todesfurcht als unbegründet erweisen."}, {"cat": "Hayek", "q": "Hayek bezeichnet eine spontan gewachsene Ordnung (wie Sprache oder Markt) als …", "ans": "Kosmos (spontane Ordnung)", "fb": "Hayek unterscheidet die gewachsene <b>spontane Ordnung (Kosmos)</b> von der bewusst gemachten Organisation (Taxis)."}, {"cat": "Hayek", "q": "Für Hayek ist der Markt eine zentral entworfene, 'gemachte' Ordnung.", "ans": "Falsch", "fb": "Im Gegenteil: Der Markt ist für Hayek eine <b>spontane, gewachsene</b> Ordnung."}, {"cat": "Wittgenstein", "q": "Der Übergang vom frühen zum späten Wittgenstein lässt sich beschreiben als Wechsel von …", "ans": "Abbildtheorie zu Gebrauchstheorie der Bedeutung", "fb": "Vom <b>Abbild</b> (Tractatus) zum <b>Gebrauch</b> in Sprachspielen (Philosophische Untersuchungen)."}, {"cat": "Hannah Arendt", "q": "Arendts Begriff der 'Macht' unterscheidet sich von 'Gewalt' dadurch, dass Macht …", "ans": "im gemeinsamen Handeln vieler entsteht und auf Zustimmung beruht", "fb": "Für Arendt entsteht <b>Macht</b> aus dem konzertierten Handeln der Vielen; <b>Gewalt</b> ist nur instrumentell."}, {"cat": "Hannah Arendt", "q": "Arendt sieht Macht und Gewalt als Gegensätze: Wo Gewalt herrscht, ist die Macht bereits geschwunden.", "ans": "Wahr", "fb": "Arendt: Gewalt tritt auf, wenn die <b>Macht</b> (gemeinsame Zustimmung) zerfällt."}, {"cat": "Spinoza", "q": "Spinoza versteht menschliche Freiheit nicht als Willkürfreiheit, sondern als …", "ans": "Einsicht in die Notwendigkeit (durch adäquate Erkenntnis)", "fb": "Freiheit ist bei Spinoza <b>Erkenntnis der Notwendigkeit</b>: Wer die Ursachen seiner Affekte versteht, wird von ihnen weniger geknechtet."}, {"cat": "Spinoza", "q": "Nach Spinoza ist der freie Wille im Sinne ursachenloser Willkür eine Illusion.", "ans": "Wahr", "fb": "Spinoza ist <b>Determinist</b>: Auch der Wille ist in die Kausalordnung eingebunden."}, {"cat": "Aristoteles", "q": "Aristoteles' Begriff der 'phronesis' bezeichnet …", "ans": "praktische Klugheit (situatives moralisches Urteil)", "fb": "<b>Phronesis</b> ist die praktische Klugheit, die im Einzelfall das rechte Maß findet."}, {"cat": "Aristoteles", "q": "Was unterscheidet bei Aristoteles 'praxis' von 'poiesis'?", "ans": "Praxis trägt ihr Ziel in sich, Poiesis (Herstellen) zielt auf ein äußeres Produkt", "fb": "<b>Praxis</b> hat ihr Ziel in sich selbst; <b>poiesis</b> erzeugt ein vom Tun verschiedenes Werk."}, {"cat": "Aristoteles", "q": "Für Aristoteles ist die theoretische Betrachtung (bios theoretikos) die höchste Form der Eudaimonia.", "ans": "Wahr", "fb": "Im Schluss der Nikomachischen Ethik gilt das <b>betrachtende Leben</b> als höchste Glücksform."}, {"cat": "Hartmut Rosa", "q": "Rosa nennt drei Achsen der Resonanz; welche Einteilung trifft zu?", "ans": "horizontale, diagonale, vertikale", "fb": "Rosa unterscheidet <b>horizontale</b> (soziale), <b>diagonale</b> (materiale) und <b>vertikale</b> (existenzielle) Resonanzachsen."}, {"cat": "Byung-Chul Han", "q": "Han kritisiert die digitale 'Transparenzgesellschaft' als Verlust von Distanz, Geheimnis und Vertrauen.", "ans": "Wahr", "fb": "In <b>Transparenzgesellschaft</b> sieht Han im Zwang zur totalen Sichtbarkeit eine neue Form der Kontrolle."}, {"cat": "Tocqueville", "q": "Tocquevilles 'wohlverstandenes Eigeninteresse' meint, dass Bürger …", "ans": "aus aufgeklärtem Eigeninteresse auch dem Gemeinwohl dienen", "fb": "Tocqueville beobachtet, dass Eigennutz und Gemeinsinn sich verbinden: Mitwirkung am Gemeinwohl liegt im aufgeklärten <b>Eigeninteresse</b>."}, {"cat": "Nozick", "q": "Nozicks Kritik an Rawls' Differenzprinzip lautet im Kern, dass Umverteilung …", "ans": "individuelle Rechte und Selbsteigentum verletzt", "fb": "Nozick wendet ein, erzwungene Umverteilung behandle Menschen als <b>Mittel</b> und verletze ihre Rechte."}, {"cat": "Nozick", "q": "Nozick illustriert seine Kritik an Verteilungsmustern mit dem 'Wilt-Chamberlain-Beispiel'.", "ans": "Wahr", "fb": "Das <b>Wilt-Chamberlain-Argument</b> zeigt, wie freiwillige Transaktionen jedes Verteilungsmuster 'stören' und doch gerecht sein können."}, {"cat": "Sokrates/Platon", "q": "Das 'sokratische Paradox' besagt sinngemäß, dass …", "ans": "niemand freiwillig Böses tut (Unrecht beruht auf Unwissen)", "fb": "Nach dem <b>sokratischen Paradox</b> handelt niemand wissentlich schlecht; Fehlverhalten beruht auf mangelnder Einsicht."}, {"cat": "Kant", "q": "Kants 'transzendentale Apperzeption' bezeichnet …", "ans": "das &#x27;Ich denke&#x27;, das alle Vorstellungen begleiten können muss", "fb": "Die <b>transzendentale Apperzeption</b> ist die Einheit des Selbstbewusstseins, die alle Erkenntnis begleitet."}, {"cat": "Kant", "q": "Kant unterscheidet hypothetische Imperative und den unbedingten kategorischen Imperativ.", "ans": "Wahr", "fb": "Hypothetische Imperative gelten unter Zwecken; der <b>kategorische</b> gilt unbedingt."}, {"cat": "Hegel", "q": "Hegels Begriff der 'Aufhebung' vereint drei Bedeutungen; welche gehört NICHT dazu?", "ans": "beschleunigen", "fb": "Hegels <b>Aufheben</b> meint zugleich negieren, bewahren und auf eine höhere Stufe heben."}, {"cat": "Hegel", "q": "In Hegels 'Herr-Knecht-Dialektik' gewinnt am Ende paradoxerweise der Knecht durch seine Arbeit ein höheres Selbstbewusstsein.", "ans": "Wahr", "fb": "Durch die formende <b>Arbeit</b> gewinnt der Knecht Selbstständigkeit, während der Herr abhängig wird."}, {"cat": "Camus", "q": "Warum nennt Camus Sisyphos am Ende 'glücklich'?", "ans": "weil er sein absurdes Schicksal hellsichtig annimmt und im Aufstieg Sinn schafft", "fb": "Im bewussten Annehmen des absurden Loses findet Sisyphos eine trotzige Erfüllung — 'Wir müssen uns Sisyphos als glücklichen Menschen vorstellen.'"}, {"cat": "Camus", "q": "Camus hält den Selbstmord für die richtige Antwort auf das Absurde.", "ans": "Falsch", "fb": "Camus <b>lehnt</b> Selbstmord wie auch den religiösen 'Sprung' ab; er empfiehlt die hellsichtige Revolte."}, {"cat": "Kant", "q": "Welche Aussagen über Kants Erkenntnistheorie treffen zu?", "ans": "Erkenntnis beginnt mit Erfahrung, entspringt aber nicht ganz aus ihr, Raum und Zeit sind Anschauungsformen a priori, Die Kategorien strukturieren die Erfahrung, Synthetische Urteile a priori sind möglich", "fb": "Das Ding an sich ist gerade unerkennbar; die übrigen Punkte sind Kerngedanken Kants."}, {"cat": "Antike", "q": "Sortiere die Werke/Ereignisse chronologisch (früh→spät).", "ans": "Sokrates&#x27; Tod → Platons Politeia → Aristoteles&#x27; Nikomachische Ethik → Epikurs Wirken", "fb": "Sokrates' Tod (399 v. Chr.), dann Platons Politeia, danach Aristoteles, schließlich Epikur (ab ~307 v. Chr.)."}], "sources": [["Stanford Encyclopedia of Philosophy", "plato.stanford.edu – ausführlich und peer-reviewed (englisch)."], ["Metzler Lexikon Philosophie", "Solides deutsches Nachschlagewerk zu Begriffen und Denkern."], ["Reclam – Grundwissen Philosophie", "Günstige, kompakte Einführungen in die Hauptthemen."], ["zeno.org", "Volltexte philosophischer Primärwerke auf Deutsch."], ["Philosophie Magazin", "philomag.de – aktuelle Debatten verständlich aufbereitet."]], "articles": {"Überblick & Teilgebiete": "<p>Die <b>Philosophie</b> gliedert sich in klassische Teilgebiete. Die <b>theoretische Philosophie</b> umfasst <b>Metaphysik/Ontologie</b> (Was ist das Sein des Seienden?), <b>Erkenntnistheorie</b> (Was können wir wissen?) und <b>Logik</b> (Regeln gültigen Schließens). Die <b>praktische Philosophie</b> umfasst <b>Ethik</b> (Was soll ich tun?), politische Philosophie und Rechtsphilosophie; die <b>Ästhetik</b> fragt nach dem Schönen und der Kunst.</p>\n<p>Kant bündelte die Grundfragen berühmt als: „Was kann ich wissen? Was soll ich tun? Was darf ich hoffen? Was ist der Mensch?\" Diese Einteilung strukturiert bis heute das Fach.</p>", "Logik & Argumentation": "<p>Die <b>Logik</b> untersucht, wann ein Schluss <b>gültig</b> ist – unabhängig vom Inhalt. Ein <b>deduktiver</b> Schluss ist gültig, wenn die Konklusion zwingend aus den Prämissen folgt; ist er gültig <i>und</i> sind die Prämissen wahr, ist er <b>schlüssig (sound)</b>. Der klassische <b>Syllogismus</b> („Alle Menschen sind sterblich; Sokrates ist ein Mensch; also ist Sokrates sterblich\") ist das Musterbeispiel.</p>\n<p>Wichtig ist die Unterscheidung von <b>Deduktion</b> (vom Allgemeinen zum Besonderen, wahrheitsbewahrend) und <b>Induktion</b> (vom Einzelfall zur Verallgemeinerung, nur wahrscheinlich). <b>Fehlschlüsse</b> wie Zirkelschluss oder Ad-hominem verletzen diese Regeln.</p>", "Antike": "<p>Die <b>antike Philosophie</b> beginnt bei den <b>Vorsokratikern</b> (Thales u. a.), die das Sein aus Naturprinzipien zu erklären suchen. <b>Sokrates</b> (470–399 v. Chr.) stellt den Menschen und die Frage nach dem guten Leben ins Zentrum und entwickelt die fragende <b>Mäeutik</b>. Sein Schüler <b>Platon</b> begründet die <b>Ideenlehre</b>, dessen Schüler <b>Aristoteles</b> die systematische Wissenschaft, Logik und Ethik.</p>\n<p>Nach Aristoteles prägen <b>hellenistische Schulen</b> das Bild: <b>Stoa</b>, <b>Epikureismus</b> und Skepsis fragen vor allem, wie der Mensch zu Seelenruhe und einem guten Leben findet.</p>", "Mittelalter": "<p>Die <b>mittelalterliche Philosophie</b> verbindet antikes Denken mit dem Christentum (und parallel mit jüdischer und islamischer Philosophie). <b>Augustinus</b> (354–430) prägt das frühe Denken platonisch; die <b>Scholastik</b> versucht, Glauben und Vernunft systematisch zu versöhnen.</p>\n<p><b>Thomas von Aquin</b> (1225–1274) integriert Aristoteles in die christliche Theologie. Zentral ist der <b>Universalienstreit</b>: Sind Allgemeinbegriffe real (Realismus) oder bloße Namen (Nominalismus, z. B. Wilhelm von Ockham mit „Ockhams Rasiermesser\")?</p>", "Rationalismus & Empirismus": "<p>In der Neuzeit ringen zwei Strömungen um die Quelle der Erkenntnis. Der <b>Rationalismus</b> (Descartes, Spinoza, Leibniz) sieht die <b>Vernunft</b> und angeborene Ideen als Fundament – Descartes' „Cogito, ergo sum\" sucht einen unbezweifelbaren Ausgangspunkt.</p>\n<p>Der <b>Empirismus</b> (Locke, Berkeley, Hume) leitet alles Wissen aus der <b>Erfahrung</b> ab; der Geist sei anfangs ein unbeschriebenes Blatt (tabula rasa). <b>Humes</b> Skepsis am Kausalitäts- und Induktionsschluss wurde zur großen Herausforderung, an der sich Kant entzündete.</p>", "Kant": "<p><b>Immanuel Kant</b> (1724–1804) vermittelt in seiner <b>kritischen Philosophie</b> zwischen Rationalismus und Empirismus: Erkenntnis entsteht, indem der Verstand die Sinnesdaten mit eigenen <b>Anschauungsformen</b> (Raum, Zeit) und <b>Kategorien</b> ordnet. Wir erkennen die Welt, wie sie uns <b>erscheint</b> (Phänomen), nicht das „Ding an sich\".</p>\n<p>In der Ethik begründet Kant den <b>kategorischen Imperativ</b>: Handle nur nach der Maxime, von der du wollen kannst, dass sie allgemeines Gesetz werde. Der Mensch ist <b>Zweck an sich</b> und nie bloß Mittel – die Würde gründet in der Vernunftautonomie.</p>", "Politische Philosophie": "<p>Die <b>politische Philosophie</b> fragt nach Legitimität von Herrschaft, Gerechtigkeit und Freiheit. <b>Vertragstheorien</b> (Hobbes, Locke, Rousseau) erklären den Staat aus einem gedachten <b>Gesellschaftsvertrag</b>: Bei Hobbes zur Bändigung des „Kriegs aller gegen alle\", bei Locke zum Schutz natürlicher Rechte, bei Rousseau aus dem „Gemeinwillen\".</p>\n<p>Im 20. Jahrhundert prägt <b>John Rawls</b> mit „Eine Theorie der Gerechtigkeit\" die Debatte: Hinter einem <b>Schleier des Nichtwissens</b> würden rationale Akteure faire Grundregeln wählen. Gegenpositionen kommen u. a. von Libertären (Nozick) und Kommunitaristen (Sandel).</p>", "19. Jahrhundert": "<p>Das 19. Jahrhundert ist vielstimmig: <b>Hegels</b> Idealismus deutet Geschichte als Entfaltung des Geistes in <b>Dialektik</b> (These–Antithese–Synthese). <b>Marx</b> stellt diese „vom Kopf auf die Füße\" und erklärt Geschichte materialistisch aus ökonomischen Verhältnissen.</p>\n<p><b>Schopenhauer</b> sieht die Welt als „Wille und Vorstellung\"; <b>Kierkegaard</b> begründet existenzielles Denken; <b>Nietzsche</b> kritisiert Moral und Metaphysik radikal („Gott ist tot\", Wille zur Macht). Daneben formuliert der <b>Utilitarismus</b> (Bentham, Mill) eine folgenorientierte Ethik.</p>", "20. Jahrhundert": "<p>Das 20. Jahrhundert spaltet sich grob in zwei Traditionen. Die <b>analytische Philosophie</b> (Frege, Russell, Wittgenstein, Wiener Kreis) rückt Sprache und Logik ins Zentrum. Die <b>kontinentale Philosophie</b> umfasst <b>Phänomenologie</b> (Husserl), <b>Existenzialismus</b> (Sartre, Camus), Hermeneutik (Gadamer) und Kritische Theorie (Adorno, Habermas).</p>\n<p>Weitere Strömungen sind Strukturalismus und Poststrukturalismus (Foucault, Derrida). Gemeinsam ist die Auseinandersetzung mit Sprache, Macht, Geschichte und der Erfahrung des Menschen in der Moderne.</p>", "Nassim Taleb": "<p><b>Nassim Nicholas Taleb</b> (geb. 1960) ist Statistiker und Essayist. In seiner „Incerto\"-Reihe untersucht er den Umgang mit <b>Unsicherheit</b> und Zufall. Sein Begriff <b>Schwarzer Schwan</b> bezeichnet seltene, kaum vorhersehbare Ereignisse mit massiven Folgen, die im Nachhinein scheinbar erklärbar wirken.</p>\n<p>Zentral ist <b>Antifragilität</b>: Manche Systeme werden durch Stress, Volatilität und Fehler nicht nur nicht geschädigt, sondern sogar stärker. Taleb plädiert für Robustheit, „skin in the game\" (eigene Haftung) und Demut gegenüber dem Nichtwissen.</p>", "Surowiecki": "<p><b>James Surowiecki</b> prägte mit „The Wisdom of Crowds\" (2004) die Idee der <b>Schwarmintelligenz</b>: Unter bestimmten Bedingungen schätzt eine vielfältige Gruppe besser als einzelne Experten.</p>\n<p>Voraussetzungen sind <b>Diversität</b> der Meinungen, <b>Unabhängigkeit</b> der Urteile, <b>Dezentralität</b> und ein Mechanismus zur <b>Aggregation</b>. Fehlen sie – etwa durch Herdenverhalten – kippt die kollektive Klugheit in kollektiven Irrtum.</p>", "Epiktet & Stoa": "<p><b>Epiktet</b> (ca. 50–135 n. Chr.) war ein freigelassener Sklave und einflussreicher <b>Stoiker</b>. Sein Kerngedanke: Wir sollten klar zwischen dem unterscheiden, was <b>in unserer Macht</b> steht (unsere Urteile, Absichten, Reaktionen), und dem, was es <b>nicht</b> ist (äußere Dinge, fremdes Handeln).</p>\n<p>Freiheit und Seelenruhe entstehen, indem wir uns auf das Erstere konzentrieren und das Übrige gelassen annehmen. Seine Lehren sind im „Handbüchlein\" (Encheiridion) überliefert.</p>", "Viktor Frankl": "<p><b>Viktor Frankl</b> (1905–1997), Wiener Psychiater und KZ-Überlebender, begründete die <b>Logotherapie</b> („dritte Wiener Schule\"). Ihr Kern: Der stärkste Antrieb des Menschen ist der <b>Wille zum Sinn</b>.</p>\n<p>In „… trotzdem Ja zum Leben sagen\" zeigt Frankl, dass Menschen selbst im Leid einen Sinn finden können, indem sie eine Haltung dazu wählen – die „letzte der menschlichen Freiheiten\" sei die Wahl der eigenen Einstellung.</p>", "J. S. Mill": "<p><b>John Stuart Mill</b> (1806–1873) ist ein Hauptvertreter des <b>Utilitarismus</b>: Richtig ist, was das größte Glück der größten Zahl fördert. Anders als Bentham unterscheidet Mill <b>qualitativ</b> höhere und niedere Freuden.</p>\n<p>In „On Liberty\" begründet er das <b>Schadensprinzip</b>: Der Staat darf die Freiheit des Einzelnen nur einschränken, um Schaden an anderen zu verhindern. Mill ist zudem ein früher Verfechter der Meinungsfreiheit und der Rechte der Frauen.</p>", "Michael Sandel": "<p><b>Michael Sandel</b> (geb. 1953) ist ein US-Philosoph und prominenter Vertreter des <b>Kommunitarismus</b>. Er kritisiert die liberale Vorstellung eines „ungebundenen Selbst\" und betont, dass Identität und Gerechtigkeit in <b>Gemeinschaften</b> und gemeinsamen Werten verankert sind.</p>\n<p>In Büchern wie „Gerechtigkeit\" und „Was man für Geld nicht kaufen kann\" warnt er vor der Ausbreitung von <b>Marktlogik</b> in Bereiche, die ihr nicht entsprechen (Bildung, Bürgerpflichten), und fragt nach dem Gemeinwohl.</p>", "Epikur": "<p><b>Epikur</b> (341–270 v. Chr.) lehrte, dass Ziel des Lebens das <b>Glück</b> sei, verstanden als <b>Lust</b> – aber als <b>Freiheit von Schmerz und Seelenruhe</b> (Ataraxie), nicht als Genusssucht. Begehrt werden sollten nur natürliche und notwendige Bedürfnisse.</p>\n<p>Sein Vierfachheilmittel („Tetrapharmakon\") tröstet u. a.: Götter sind nicht zu fürchten, der Tod „geht uns nichts an\", weil wir ihn nie erleben. Epikur schätzte Freundschaft und ein zurückgezogenes, maßvolles Leben.</p>", "C. S. Lewis": "<p><b>C. S. Lewis</b> (1898–1963), Literaturwissenschaftler in Oxford/Cambridge, war ein einflussreicher <b>christlicher Denker</b> und Apologet. In „Pardon, ich bin Christ\" (Mere Christianity) argumentiert er u. a. mit dem <b>moralischen Argument</b>: das universelle Empfinden für Recht und Unrecht verweise auf eine objektive Grundlage.</p>\n<p>Bekannt ist auch sein „Lügner-Wahnsinniger-Herr\"-Trilemma sowie sein literarisches Werk (Narnia). Lewis verband intellektuelle Strenge mit allgemein verständlicher Sprache.</p>", "Hayek": "<p><b>Friedrich August von Hayek</b> (1899–1992), Ökonom und Sozialphilosoph, erhielt 1974 den Wirtschaftsnobelpreis. Sein zentrales Argument: <b>Wissen ist verteilt</b> – kein zentraler Planer kann das in einer Gesellschaft verstreute Wissen bündeln. <b>Preise</b> fungieren als dezentraler Informationsmechanismus.</p>\n<p>In „Der Weg zur Knechtschaft\" warnt er vor zentraler Planwirtschaft als Gefahr für die Freiheit. Hayek betont <b>spontane Ordnung</b>: funktionierende Institutionen (Sprache, Markt, Recht) entstehen oft, ohne bewusst entworfen zu sein.</p>", "Wittgenstein": "<p><b>Ludwig Wittgenstein</b> (1889–1951) prägte die Philosophie des 20. Jahrhunderts in zwei Phasen. Im frühen „Tractatus\" vertritt er eine <b>Abbildtheorie</b> der Sprache und schließt: „Wovon man nicht sprechen kann, darüber muss man schweigen.\"</p>\n<p>Der späte Wittgenstein („Philosophische Untersuchungen\") verwirft das: Bedeutung entsteht im <b>Gebrauch</b>, in <b>Sprachspielen</b> und Lebensformen. Viele philosophische Probleme seien Verwirrungen, die durch das Missverstehen der Sprache entstehen.</p>", "Hannah Arendt": "<p><b>Hannah Arendt</b> (1906–1975) war eine politische Denkerin. In „Vita activa\" unterscheidet sie <b>Arbeiten, Herstellen und Handeln</b>; das <b>Handeln</b> – gemeinsames Tun im öffentlichen Raum – macht den Menschen politisch.</p>\n<p>Bekannt wurde ihr Begriff der <b>Banalität des Bösen</b> (im Eichmann-Bericht): Großes Unrecht entsteht oft nicht durch dämonische Täter, sondern durch gedankenlose Mitläufer. Arendt analysierte zudem die Wurzeln des Totalitarismus.</p>", "Spinoza": "<p><b>Baruch de Spinoza</b> (1632–1677) ist ein Hauptvertreter des Rationalismus. In seiner „Ethik\" vertritt er einen <b>Monismus</b>: Es gibt nur <b>eine</b> Substanz, die er „<b>Deus sive Natura</b>\" (Gott oder die Natur) nennt – Gott und Welt fallen zusammen (Pantheismus).</p>\n<p>Alles geschehe notwendig nach Naturgesetzen; Freiheit bedeutet, dies einzusehen und nach Vernunft zu leben. Mit dieser Lehre wurde Spinoza zu Lebzeiten als radikal verfemt, im 19. Jahrhundert aber wiederentdeckt.</p>", "Marc Aurel": "<p><b>Marc Aurel</b> (121–180 n. Chr.), römischer Kaiser und <b>Stoiker</b>, hinterließ mit den „<b>Selbstbetrachtungen</b>\" eines der berühmtesten stoischen Werke – ursprünglich private Notizen.</p>\n<p>Er übt sich darin, das Schicksal gelassen anzunehmen, die eigene Vergänglichkeit zu bedenken, der Vernunft und Pflicht zu folgen und sich nicht von äußeren Dingen aus der Ruhe bringen zu lassen – Pflichterfüllung und innere Haltung stehen im Zentrum.</p>", "Aristoteles": "<p><b>Aristoteles</b> (384–322 v. Chr.), Schüler Platons, gilt als Begründer zahlreicher Wissenschaften und der formalen <b>Logik</b> (Syllogistik). In der Metaphysik verwirft er Platons getrennte Ideenwelt: Das Wesen der Dinge liegt in ihnen selbst (Form und Stoff).</p>\n<p>Seine <b>Tugendethik</b> sieht das Ziel im <b>Eudaimonia</b> (gelingendes Leben). Tugend ist die durch Übung erworbene <b>Mitte</b> zwischen zwei Extremen (z. B. Mut zwischen Feigheit und Tollkühnheit). Der Mensch ist ein „zoon politikon\", ein auf Gemeinschaft angelegtes Wesen.</p>", "Putnam (Sozialkapital)": "<p><b>Robert D. Putnam</b> (geb. 1941) ist Politikwissenschaftler. Mit „<b>Bowling Alone</b>\" prägte er die Debatte um <b>Sozialkapital</b> – den Wert von Netzwerken, Vertrauen und Gegenseitigkeit in einer Gesellschaft.</p>\n<p>Er unterscheidet <b>bindendes</b> (innerhalb einer Gruppe) und <b>brückenbildendes</b> Sozialkapital (zwischen Gruppen) und diagnostiziert einen Rückgang bürgerschaftlichen Engagements in modernen Gesellschaften.</p>", "Veblen": "<p><b>Thorstein Veblen</b> (1857–1929), Ökonom und Soziologe, prägte in „Theorie der feinen Leute\" den Begriff <b>demonstrativer Konsum</b> (conspicuous consumption): Güter werden auch gekauft, um <b>Status</b> zu zeigen, nicht nur zum Gebrauch.</p>\n<p>Daraus folgt das Phänomen der <b>Veblen-Güter</b>, deren Nachfrage mit dem Preis sogar <i>steigen</i> kann, weil der hohe Preis selbst das Prestige ausmacht.</p>", "Byung-Chul Han": "<p><b>Byung-Chul Han</b> (geb. 1959) ist ein in Deutschland lehrender Kulturphilosoph. In „<b>Müdigkeitsgesellschaft</b>\" beschreibt er den Wandel von der Disziplinar- zur <b>Leistungsgesellschaft</b>: Wir beuten uns selbst aus, weil wir glauben, frei und unbegrenzt optimierbar zu sein.</p>\n<p>Folgen seien Erschöpfung, Burnout und Depression. Han kritisiert zudem die Auflösung von Distanz, Ritual und Kontemplation in einer transparenz- und beschleunigungsgetriebenen Kultur.</p>", "Hartmut Rosa": "<p><b>Hartmut Rosa</b> (geb. 1965) ist ein deutscher Soziologe. Seine Diagnose der Moderne ist die <b>soziale Beschleunigung</b>: technischer, sozialer und Lebenstempo-Wandel verdichten sich, was zu Entfremdung führen kann.</p>\n<p>Als Gegenbegriff entwickelt er die <b>Resonanz</b>: eine gelingende, antwortende Beziehung zur Welt (zu Menschen, Dingen, Natur). Ein gutes Leben misst sich für Rosa nicht an Ressourcen, sondern an gelingenden Resonanzachsen.</p>", "Tocqueville": "<p><b>Alexis de Tocqueville</b> (1805–1859) analysierte in „<b>Über die Demokratie in Amerika</b>\" die aufkommende demokratische Gesellschaft. Er bewunderte ihre Gleichheit und das rege Vereinsleben, warnte aber vor Gefahren.</p>\n<p>Berühmt ist seine Sorge vor der „<b>Tyrannei der Mehrheit</b>\" und vor einem milden, bevormundenden Despotismus, der die Bürger entmündigt. Zivilgesellschaftliche Assoziationen sah er als Schutz der Freiheit.</p>", "Nozick": "<p><b>Robert Nozick</b> (1938–2002) ist ein Hauptvertreter des <b>Libertarismus</b>. In „Anarchie, Staat und Utopia\" (1974) – einer direkten Antwort auf Rawls – verteidigt er den <b>Minimalstaat</b>, der nur Schutz von Leben, Freiheit und Eigentum garantiert.</p>\n<p>Seine <b>Anspruchstheorie</b> der Gerechtigkeit fragt nicht nach Verteilungsmustern, sondern danach, ob Besitz rechtmäßig erworben und übertragen wurde. Umverteilung durch Steuern kritisiert er als Eingriff in individuelle Rechte.</p>", "Stoa": "<p>Die <b>Stoa</b> (gegründet von Zenon von Kition, ~300 v. Chr.) ist eine der einflussreichsten antiken Schulen. Sie lehrt, gemäß der <b>Natur und der Vernunft (Logos)</b> zu leben und zwischen dem zu unterscheiden, was in unserer Macht steht und was nicht.</p>\n<p>Ziel ist die <b>Apatheia/Seelenruhe</b>: Nicht das Geschehen stört uns, sondern unsere Urteile darüber. Tugend gilt als das einzige wahre Gut. Hauptvertreter sind Seneca, Epiktet und Marc Aurel.</p>", "Sokrates/Platon": "<p><b>Sokrates</b> (470–399 v. Chr.) hinterließ keine Schriften; wir kennen ihn v. a. durch seinen Schüler <b>Platon</b>. Seine Methode ist die fragende Gesprächskunst (Mäeutik, „ich weiß, dass ich nichts weiß\"), die scheinbares Wissen entlarvt.</p>\n<p>Platon (428–348 v. Chr.) begründet mit der <b>Ideenlehre</b> die Annahme, dass den vergänglichen Dingen unveränderliche <b>Ideen</b> zugrunde liegen. Sein <b>Höhlengleichnis</b> veranschaulicht den Aufstieg von der Sinnenwelt zur Erkenntnis.</p>", "Hegel": "<p><b>Georg Wilhelm Friedrich Hegel</b> (1770–1831) ist der Hauptvertreter des <b>deutschen Idealismus</b>. Er deutet Wirklichkeit und Geschichte als Entfaltung des <b>Weltgeistes</b>, der sich in einem dialektischen Prozess fortbewegt.</p>\n<p>Die <b>Dialektik</b> (oft als These–Antithese–Synthese zusammengefasst) treibt das Denken über Widersprüche zu höheren Einsichten. „Das Wahre ist das Ganze\" – Erkenntnis ist für Hegel ein historischer, sich entwickelnder Prozess.</p>", "Nietzsche": "<p><b>Friedrich Nietzsche</b> (1844–1900) kritisierte radikal die abendländische Moral und Metaphysik. Seine Formel „<b>Gott ist tot</b>\" diagnostiziert den Verlust verbindlicher Werte (Nihilismus), den der Mensch schöpferisch überwinden müsse.</p>\n<p>Zentrale Begriffe sind der <b>Wille zur Macht</b>, der <b>Übermensch</b> als selbstschöpferisches Ideal und die <b>ewige Wiederkehr</b> als Prüfstein der Lebensbejahung. Sein aphoristischer Stil war enorm wirkungsmächtig – und wurde oft missdeutet.</p>", "Camus": "<p><b>Albert Camus</b> (1913–1960) gehört zum Umkreis des Existenzialismus und entwickelte die Philosophie des <b>Absurden</b>: Der Mensch sucht Sinn in einer Welt, die ihm keinen liefert – aus diesem Widerspruch entsteht das Absurde.</p>\n<p>In „Der Mythos des Sisyphos\" lautet die Antwort nicht Resignation, sondern <b>Auflehnung</b>: Sisyphos, der ewig den Stein rollt, sei „als ein glücklicher Mensch vorzustellen\". Camus plädiert für ein hellsichtiges, trotziges Ja zum Leben.</p>"}};
document.documentElement.style.setProperty('--brand',APP.color);
const m=document.createElement('meta');m.name='theme-color';m.content=APP.color;document.head.appendChild(m);
document.title=APP.title+' – Nachschlagewerk';
document.getElementById('brand').innerHTML=APP.brand;
document.getElementById('logo').textContent=APP.ic;
document.getElementById('foot').textContent=APP.title+' · Nachschlagewerk · '+APP.entries.length+' Einträge';
// tabs
const tabsDef=[['look','Nachschlagen']];
if(APP.aroma)tabsDef.push(['aroma','Aromarad']);
tabsDef.push(['src','Quellen']);
const tabsEl=document.getElementById('tabs');
tabsDef.forEach((t,i)=>{const b=document.createElement('button');b.textContent=t[1];if(i===0)b.classList.add('active');
  b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('v-'+t[0]).classList.add('active');window.scrollTo({top:0});};
  tabsEl.appendChild(b);});
// chips
let activeCat='__all__';
const chipsEl=document.getElementById('chips');
function mkChip(label,val){const b=document.createElement('button');b.className='chip'+(val===activeCat?' active':'');b.textContent=label;
  b.onclick=()=>{activeCat=val;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');render();};return b;}
chipsEl.appendChild(mkChip('Alle','__all__'));
APP.order.forEach(c=>{const ic=APP.icons[c]?APP.icons[c]+' ':'';chipsEl.appendChild(mkChip(ic+c,c));});
// render
const strip=s=>(s||'').replace(/<[^>]+>/g,'');
const searchEl=document.getElementById('search');
function render(){
  const q=searchEl.value.trim().toLowerCase();
  const cats=activeCat==='__all__'?APP.order:[activeCat];
  const list=document.getElementById('list');list.innerHTML='';
  let total=0;
  cats.forEach(cat=>{
    let items=APP.entries.filter(e=>e.cat===cat);
    if(q)items=items.filter(e=>(e.q+' '+strip(e.ans)+' '+strip(e.fb)).toLowerCase().includes(q));
    if(!items.length)return;
    total+=items.length;
    const block=document.createElement('div');block.className='catblock';
    const ic=APP.icons[cat]?'<span class="ic">'+APP.icons[cat]+'</span>':'';
    const art=(APP.articles&&APP.articles[cat])?'<div class="article">'+APP.articles[cat]+'</div>':'';
    block.innerHTML='<h2>'+ic+cat+'</h2>'+art+(items.length?'<div class="factlabel">Fakten &amp; Details</div>':'')+items.map(e=>{
      let s='<div class="entry"><div class="q">'+e.q+'</div>';
      if(e.ans)s+='<div class="ans"><span class="lab">Antwort:</span> '+e.ans+'</div>';
      if(e.fb)s+='<div class="fb">'+e.fb+'</div>';
      return s+'</div>';
    }).join('');
    list.appendChild(block);
  });
  document.getElementById('count').textContent=total+' Einträge'+(q?' für „'+searchEl.value+'"':'')+(activeCat!=='__all__'?' in '+activeCat:'');
  if(!total)list.innerHTML='<div class="empty">Nichts gefunden.</div>';
}
searchEl.addEventListener('input',render);
// sources
document.getElementById('srclist').innerHTML=APP.sources.map(s=>'<div class="src"><b>'+s[0]+'</b><p>'+s[1]+'</p></div>').join('');
render();
</script>
</body>
</html>
