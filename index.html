<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachschlagewerk</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Philosophie">
<style>
:root{--bg:#f7f6f2;--panel:#fff;--ink:#1c1b18;--muted:#6b6862;--line:#e7e4dc;
  --brand:#3b6e58;--brandink:#fff;--soft:#f0eee9;--hover:#f3f0fa;
  --shadow:0 8px 24px rgba(40,30,20,.07);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
[data-theme="dark"]{--bg:#15131a;--panel:#1d1a24;--ink:#ece8f1;--muted:#a49db4;--line:#322c3c;
  --soft:#241f2e;--hover:#262031;--brandink:#fff;--shadow:0 8px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.6;-webkit-text-size-adjust:100%}
a{color:var(--brand)}
header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:1100px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-size:19px;background:var(--brand);color:#fff;flex:0 0 auto;border:none;cursor:pointer;padding:0}
.ttl b{font-size:16px;font-weight:800;display:block;line-height:1.1}
.ttl span{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.hd .sp{flex:1}
.search{width:min(340px,42vw);font:inherit;font-size:14px;color:var(--ink);background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:9px 13px}
.search:focus{outline:none;border-color:var(--brand)}
.iconbtn{background:var(--panel);border:1.5px solid var(--line);color:var(--ink);border-radius:10px;width:38px;height:38px;font-size:16px;cursor:pointer;flex:0 0 auto}
.menubtn{display:none}
.shell{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:280px 1fr;gap:0}
aside{border-right:1px solid var(--line);padding:18px 10px 60px;height:calc(100vh - 58px);overflow:auto;position:sticky;top:58px}
.cat{margin-bottom:4px}
.cat>.catname{display:flex;align-items:center;gap:7px;width:100%;text-align:left;font:inherit;font-weight:700;font-size:14px;color:var(--ink);
  background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:8px}
.cat>.catname:hover{background:var(--soft)}
.cat>.catname .tw{margin-left:auto;color:var(--muted);font-size:11px;transition:.15s}
.cat.collapsed .children{display:none}
.cat.collapsed .tw{transform:rotate(-90deg)}
.children{padding-left:6px}
.subname{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:8px 10px 3px}
.alink{display:block;font:inherit;text-align:left;width:100%;background:none;border:none;color:var(--ink);cursor:pointer;
  padding:6px 10px 6px 22px;border-radius:7px;font-size:13.5px;line-height:1.35}
.alink:hover{background:var(--soft)}
.alink.active{background:var(--brand);color:var(--brandink);font-weight:600}
main{padding:26px 30px 80px;min-width:0;max-width:780px}
.crumb{font-size:12.5px;color:var(--muted);margin-bottom:6px}
.art h1{font-size:30px;margin:0 0 14px;line-height:1.15;font-weight:800}
.art h2{font-size:21px;margin:26px 0 8px}
.art h3{font-size:17px;margin:20px 0 6px}
.art p{margin:0 0 13px}
.art ul{margin:0 0 13px;padding-left:20px}.art li{margin-bottom:5px}
.art a.ilink{color:var(--brand);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--brand) 35%,transparent);cursor:pointer}
.art a.ilink:hover{border-bottom-color:var(--brand)}
.lead{font-size:16.5px;color:var(--ink)}
.box{background:var(--soft);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:12px;padding:12px 16px;margin:14px 0;font-size:14.5px}
.seealso{margin-top:26px;border-top:1px solid var(--line);padding-top:14px}
.seealso b{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.seealso .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.seealso .chips a{font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 12px;text-decoration:none;color:var(--brand)}
.aromaframe{width:100%;height:72vh;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
.results .alink{padding-left:10px}
.sidebackdrop{display:none}
@media(max-width:820px){
 .hd{padding-top:calc(env(safe-area-inset-top) + 22px);padding-bottom:12px}
 .iconbtn,.menubtn{width:44px;height:44px;font-size:18px}
 .shell{grid-template-columns:1fr}
 aside{position:fixed;top:0;left:0;bottom:0;width:280px;height:100vh;z-index:40;background:var(--panel);transform:translateX(-105%);transition:.25s;padding-top:16px}
 aside.open{transform:none}
 .sidebackdrop.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
 .menubtn{display:grid;place-items:center}
 main{padding:20px 16px 70px}
 .search{width:auto;flex:1}
 .ttl{display:none}
}
</style>
</head>
<body>
<header>
  <div class="hd">
    <button class="iconbtn menubtn" id="menubtn" aria-label="Menü">☰</button>
    <button class="logo" id="logo" title="Startseite" aria-label="Startseite"></button>
    <div class="ttl"><b id="brand"></b><span>Nachschlagewerk</span></div>
    <span class="sp"></span>
    <input class="search" id="search" placeholder="Artikel suchen …">
    <button class="iconbtn" id="themebtn" aria-label="Dark Mode">🌙</button>
  </div>
</header>
<div class="sidebackdrop" id="backdrop"></div>
<div class="shell">
  <aside id="side"></aside>
  <main id="main"></main>
</div>
<script>
const APP={"title": "Philosophie", "brand": "Philo<b>sophie</b>", "color": "#3b6e58", "ic": "🏛", "articles": [{"slug": "ueberblick-teilgebiete", "title": "Überblick & Teilgebiete", "crumb": "Grundlagen", "body": "<p>Die <b>Philosophie</b> gliedert sich in klassische Teilgebiete. Die <b>theoretische Philosophie</b> umfasst <b>Metaphysik/Ontologie</b> (Was ist das Sein des Seienden?), <b>Erkenntnistheorie</b> (Was können wir wissen?) und <b><a class=\"ilink\" data-s=\"logik-argumentation\">Logik</a></b> (Regeln gültigen Schließens). Die <b>praktische Philosophie</b> umfasst <b>Ethik</b> (Was soll ich tun?), politische Philosophie und Rechtsphilosophie; die <b>Ästhetik</b> fragt nach dem Schönen und der Kunst.</p>\n<p>Kant bündelte die Grundfragen berühmt als: „Was kann ich wissen? Was soll ich tun? Was darf ich hoffen? Was ist der Mensch?\" Diese Einteilung strukturiert bis heute das Fach.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"antike\">Antike</a> und <a class=\"ilink\" data-s=\"mittelalter\">Mittelalter</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"quellen\">Quellen & Weiterlesen</a>.</p>", "rel": []}, {"slug": "logik-argumentation", "title": "Logik & Argumentation", "crumb": "Grundlagen", "body": "<p>Die <b>Logik</b> untersucht, wann ein Schluss <b>gültig</b> ist – unabhängig vom Inhalt. Ein <b>deduktiver</b> Schluss ist gültig, wenn die Konklusion zwingend aus den Prämissen folgt; ist er gültig <i>und</i> sind die Prämissen wahr, ist er <b>schlüssig (sound)</b>. Der klassische <b>Syllogismus</b> („Alle Menschen sind sterblich; <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates</a> ist ein Mensch; also ist Sokrates sterblich\") ist das Musterbeispiel.</p>\n<p>Wichtig ist die Unterscheidung von <b>Deduktion</b> (vom Allgemeinen zum Besonderen, wahrheitsbewahrend) und <b>Induktion</b> (vom Einzelfall zur Verallgemeinerung, nur wahrscheinlich). <b>Fehlschlüsse</b> wie Zirkelschluss oder Ad-hominem verletzen diese Regeln.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"ueberblick-teilgebiete\">Überblick & Teilgebiete</a> und <a class=\"ilink\" data-s=\"antike\">Antike</a>.</p>", "rel": []}, {"slug": "antike", "title": "Antike", "crumb": "Epochen & Strömungen", "body": "<p>Die <b>antike Philosophie</b> beginnt bei den <b>Vorsokratikern</b> (Thales u. a.), die das Sein aus Naturprinzipien zu erklären suchen. <b><a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates</a></b> (470–399 v. Chr.) stellt den Menschen und die Frage nach dem guten Leben ins Zentrum und entwickelt die fragende <b>Mäeutik</b>. Sein Schüler <b>Platon</b> begründet die <b>Ideenlehre</b>, dessen Schüler <b><a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a></b> die systematische Wissenschaft, <a class=\"ilink\" data-s=\"logik-argumentation\">Logik</a> und <a class=\"ilink\" data-s=\"ueberblick-teilgebiete\">Ethik</a>.</p>\n<p>Nach Aristoteles prägen <b>hellenistische Schulen</b> das Bild: <b><a class=\"ilink\" data-s=\"stoa\">Stoa</a></b>, <b>Epikureismus</b> und Skepsis fragen vor allem, wie der Mensch zu Seelenruhe und einem guten Leben findet.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"kant\">Kant</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"politische-philosophie\">Politische Philosophie</a>.</p>", "rel": []}, {"slug": "mittelalter", "title": "Mittelalter", "crumb": "Epochen & Strömungen", "body": "<p>Die <b>mittelalterliche Philosophie</b> verbindet antikes Denken mit dem Christentum (und parallel mit jüdischer und islamischer Philosophie). <b>Augustinus</b> (354–430) prägt das frühe Denken platonisch; die <b>Scholastik</b> versucht, Glauben und Vernunft systematisch zu versöhnen.</p>\n<p><b>Thomas von Aquin</b> (1225–1274) integriert <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> in die christliche Theologie. Zentral ist der <b>Universalienstreit</b>: Sind Allgemeinbegriffe real (Realismus) oder bloße Namen (Nominalismus, z. B. Wilhelm von Ockham mit „Ockhams Rasiermesser\")?</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"antike\">Antike</a> und <a class=\"ilink\" data-s=\"rationalismus-empirismus\">Rationalismus & Empirismus</a>.</p>", "rel": []}, {"slug": "rationalismus-empirismus", "title": "Rationalismus & Empirismus", "crumb": "Epochen & Strömungen", "body": "<p>In der Neuzeit ringen zwei Strömungen um die Quelle der Erkenntnis. Der <b>Rationalismus</b> (Descartes, <a class=\"ilink\" data-s=\"spinoza\">Spinoza</a>, Leibniz) sieht die <b>Vernunft</b> und angeborene Ideen als Fundament – Descartes' „Cogito, ergo sum\" sucht einen unbezweifelbaren Ausgangspunkt.</p>\n<p>Der <b>Empirismus</b> (Locke, Berkeley, Hume) leitet alles Wissen aus der <b>Erfahrung</b> ab; der Geist sei anfangs ein unbeschriebenes Blatt (tabula rasa). <b>Humes</b> Skepsis am Kausalitäts- und Induktionsschluss wurde zur großen Herausforderung, an der sich Kant entzündete.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"antike\">Antike</a> und <a class=\"ilink\" data-s=\"mittelalter\">Mittelalter</a>.</p>", "rel": []}, {"slug": "kant", "title": "Kant", "crumb": "Epochen & Strömungen", "body": "<p><b>Immanuel Kant</b> (1724–1804) vermittelt in seiner <b>kritischen Philosophie</b> zwischen <a class=\"ilink\" data-s=\"rationalismus-empirismus\">Rationalismus</a> und Empirismus: Erkenntnis entsteht, indem der Verstand die Sinnesdaten mit eigenen <b>Anschauungsformen</b> (Raum, Zeit) und <b>Kategorien</b> ordnet. Wir erkennen die Welt, wie sie uns <b>erscheint</b> (Phänomen), nicht das „Ding an sich\".</p>\n<p>In der <a class=\"ilink\" data-s=\"ueberblick-teilgebiete\">Ethik</a> begründet Kant den <b>kategorischen Imperativ</b>: Handle nur nach der Maxime, von der du wollen kannst, dass sie allgemeines Gesetz werde. Der Mensch ist <b>Zweck an sich</b> und nie bloß Mittel – die Würde gründet in der Vernunftautonomie.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"antike\">Antike</a>.</p>", "rel": []}, {"slug": "19-jahrhundert", "title": "19. Jahrhundert", "crumb": "Epochen & Strömungen", "body": "<p>Das 19. Jahrhundert ist vielstimmig: <b>Hegels</b> Idealismus deutet Geschichte als Entfaltung des Geistes in <b><a class=\"ilink\" data-s=\"hegel\">Dialektik</a></b> (These–Antithese–Synthese). <b>Marx</b> stellt diese „vom Kopf auf die Füße\" und erklärt Geschichte materialistisch aus ökonomischen Verhältnissen.</p>\n<p><b>Schopenhauer</b> sieht die Welt als „Wille und Vorstellung\"; <b>Kierkegaard</b> begründet existenzielles Denken; <b><a class=\"ilink\" data-s=\"nietzsche\">Nietzsche</a></b> kritisiert Moral und <a class=\"ilink\" data-s=\"ueberblick-teilgebiete\">Metaphysik</a> radikal („Gott ist tot\", Wille zur Macht). Daneben formuliert der <b><a class=\"ilink\" data-s=\"j-s-mill\">Utilitarismus</a></b> (Bentham, Mill) eine folgenorientierte Ethik.</p>", "rel": []}, {"slug": "20-jahrhundert", "title": "20. Jahrhundert", "crumb": "Epochen & Strömungen", "body": "<p>Das 20. Jahrhundert spaltet sich grob in zwei Traditionen. Die <b>analytische Philosophie</b> (Frege, Russell, <a class=\"ilink\" data-s=\"wittgenstein\">Wittgenstein</a>, Wiener Kreis) rückt Sprache und <a class=\"ilink\" data-s=\"logik-argumentation\">Logik</a> ins Zentrum. Die <b>kontinentale Philosophie</b> umfasst <b>Phänomenologie</b> (Husserl), <b>Existenzialismus</b> (Sartre, <a class=\"ilink\" data-s=\"camus\">Camus</a>), Hermeneutik (Gadamer) und Kritische Theorie (Adorno, Habermas).</p>\n<p>Weitere Strömungen sind Strukturalismus und Poststrukturalismus (Foucault, Derrida). Gemeinsam ist die Auseinandersetzung mit Sprache, Macht, Geschichte und der Erfahrung des Menschen in der Moderne.</p>", "rel": []}, {"slug": "politische-philosophie", "title": "Politische Philosophie", "crumb": "Epochen & Strömungen", "body": "<p>Die <b>politische Philosophie</b> fragt nach Legitimität von Herrschaft, Gerechtigkeit und Freiheit. <b>Vertragstheorien</b> (Hobbes, Locke, Rousseau) erklären den Staat aus einem gedachten <b>Gesellschaftsvertrag</b>: Bei Hobbes zur Bändigung des „Kriegs aller gegen alle\", bei Locke zum Schutz natürlicher Rechte, bei Rousseau aus dem „Gemeinwillen\".</p>\n<p>Im <a class=\"ilink\" data-s=\"20-jahrhundert\">20. Jahrhundert</a> prägt <b>John Rawls</b> mit „Eine Theorie der Gerechtigkeit\" die Debatte: Hinter einem <b>Schleier des Nichtwissens</b> würden rationale Akteure faire Grundregeln wählen. Gegenpositionen kommen u. a. von Libertären (<a class=\"ilink\" data-s=\"nozick\">Nozick</a>) und Kommunitaristen (<a class=\"ilink\" data-s=\"michael-sandel\">Sandel</a>).</p>", "rel": []}, {"slug": "sokrates-platon", "title": "Sokrates/Platon", "crumb": "Denker › Antike", "body": "<p><b>Sokrates</b> (470–399 v. Chr.) hinterließ keine Schriften; wir kennen ihn v. a. durch seinen Schüler <b>Platon</b>. Seine Methode ist die fragende Gesprächskunst (Mäeutik, „ich weiß, dass ich nichts weiß\"), die scheinbares Wissen entlarvt.</p>\n<p>Platon (428–348 v. Chr.) begründet mit der <b>Ideenlehre</b> die Annahme, dass den vergänglichen Dingen unveränderliche <b>Ideen</b> zugrunde liegen. Sein <b>Höhlengleichnis</b> veranschaulicht den Aufstieg von der Sinnenwelt zur Erkenntnis.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a>, <a class=\"ilink\" data-s=\"epikur\">Epikur</a> und <a class=\"ilink\" data-s=\"stoa\">Stoa</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"epiktet-stoa\">Epiktet & Stoa</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"hannah-arendt\">Hannah Arendt</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"hayek\">Hayek</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"tocqueville\">Tocqueville</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"veblen\">Veblen</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"putnam-sozialkapital\">Putnam (Sozialkapital)</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"byung-chul-han\">Byung-Chul Han</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"hartmut-rosa\">Hartmut Rosa</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"viktor-frankl\">Viktor Frankl</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"c-s-lewis\">C. S. Lewis</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"surowiecki\">Surowiecki</a>.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"nassim-taleb\">Nassim Taleb</a>.</p>", "rel": []}, {"slug": "aristoteles", "title": "Aristoteles", "crumb": "Denker › Antike", "body": "<p><b>Aristoteles</b> (384–322 v. Chr.), Schüler Platons, gilt als Begründer zahlreicher Wissenschaften und der formalen <b><a class=\"ilink\" data-s=\"logik-argumentation\">Logik</a></b> (Syllogistik). In der <a class=\"ilink\" data-s=\"ueberblick-teilgebiete\">Metaphysik</a> verwirft er Platons getrennte Ideenwelt: Das Wesen der Dinge liegt in ihnen selbst (Form und Stoff).</p>\n<p>Seine <b>Tugendethik</b> sieht das Ziel im <b>Eudaimonia</b> (gelingendes Leben). Tugend ist die durch Übung erworbene <b>Mitte</b> zwischen zwei Extremen (z. B. Mut zwischen Feigheit und Tollkühnheit). Der Mensch ist ein „zoon politikon\", ein auf Gemeinschaft angelegtes Wesen.</p><p>Eng verwandt ist der Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>.</p>", "rel": []}, {"slug": "epikur", "title": "Epikur", "crumb": "Denker › Antike", "body": "<p><b>Epikur</b> (341–270 v. Chr.) lehrte, dass Ziel des Lebens das <b>Glück</b> sei, verstanden als <b>Lust</b> – aber als <b>Freiheit von Schmerz und Seelenruhe</b> (Ataraxie), nicht als Genusssucht. Begehrt werden sollten nur natürliche und notwendige Bedürfnisse.</p>\n<p>Sein Vierfachheilmittel („Tetrapharmakon\") tröstet u. a.: Götter sind nicht zu fürchten, der Tod „geht uns nichts an\", weil wir ihn nie erleben. Epikur schätzte Freundschaft und ein zurückgezogenes, maßvolles Leben.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"stoa\">Stoa</a>.</p>", "rel": []}, {"slug": "stoa", "title": "Stoa", "crumb": "Denker › Antike", "body": "<p>Die <b>Stoa</b> (gegründet von Zenon von Kition, ~300 v. Chr.) ist eine der einflussreichsten antiken Schulen. Sie lehrt, gemäß der <b>Natur und der Vernunft (Logos)</b> zu leben und zwischen dem zu unterscheiden, was in unserer Macht steht und was nicht.</p>\n<p>Ziel ist die <b>Apatheia/Seelenruhe</b>: Nicht das Geschehen stört uns, sondern unsere Urteile darüber. Tugend gilt als das einzige wahre Gut. Hauptvertreter sind Seneca, Epiktet und <a class=\"ilink\" data-s=\"marc-aurel\">Marc Aurel</a>.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a> und <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a>.</p>", "rel": []}, {"slug": "epiktet-stoa", "title": "Epiktet & Stoa", "crumb": "Denker › Antike", "body": "<p><b>Epiktet</b> (ca. 50–135 n. Chr.) war ein freigelassener Sklave und einflussreicher <b><a class=\"ilink\" data-s=\"stoa\">Stoiker</a></b>. Sein Kerngedanke: Wir sollten klar zwischen dem unterscheiden, was <b>in unserer Macht</b> steht (unsere Urteile, Absichten, Reaktionen), und dem, was es <b>nicht</b> ist (äußere Dinge, fremdes Handeln).</p>\n<p>Freiheit und Seelenruhe entstehen, indem wir uns auf das Erstere konzentrieren und das Übrige gelassen annehmen. Seine Lehren sind im „Handbüchlein\" (Encheiridion) überliefert.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a> und <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a>.</p>", "rel": []}, {"slug": "marc-aurel", "title": "Marc Aurel", "crumb": "Denker › Antike", "body": "<p><b>Marc Aurel</b> (121–180 n. Chr.), römischer Kaiser und <b><a class=\"ilink\" data-s=\"stoa\">Stoiker</a></b>, hinterließ mit den „<b>Selbstbetrachtungen</b>\" eines der berühmtesten stoischen Werke – ursprünglich private Notizen.</p>\n<p>Er übt sich darin, das Schicksal gelassen anzunehmen, die eigene Vergänglichkeit zu bedenken, der Vernunft und Pflicht zu folgen und sich nicht von äußeren Dingen aus der Ruhe bringen zu lassen – Pflichterfüllung und innere Haltung stehen im Zentrum.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a> und <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a>.</p>", "rel": []}, {"slug": "spinoza", "title": "Spinoza", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Baruch de Spinoza</b> (1632–1677) ist ein Hauptvertreter des <a class=\"ilink\" data-s=\"rationalismus-empirismus\">Rationalismus</a>. In seiner „<a class=\"ilink\" data-s=\"ueberblick-teilgebiete\">Ethik</a>\" vertritt er einen <b>Monismus</b>: Es gibt nur <b>eine</b> Substanz, die er „<b>Deus sive Natura</b>\" (Gott oder die Natur) nennt – Gott und Welt fallen zusammen (Pantheismus).</p>\n<p>Alles geschehe notwendig nach Naturgesetzen; Freiheit bedeutet, dies einzusehen und nach Vernunft zu leben. Mit dieser Lehre wurde Spinoza zu Lebzeiten als radikal verfemt, im <a class=\"ilink\" data-s=\"19-jahrhundert\">19. Jahrhundert</a> aber wiederentdeckt.</p>", "rel": []}, {"slug": "hegel", "title": "Hegel", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Georg Wilhelm Friedrich Hegel</b> (1770–1831) ist der Hauptvertreter des <b>deutschen Idealismus</b>. Er deutet Wirklichkeit und Geschichte als Entfaltung des <b>Weltgeistes</b>, der sich in einem dialektischen Prozess fortbewegt.</p>\n<p>Die <b>Dialektik</b> (oft als These–Antithese–Synthese zusammengefasst) treibt das Denken über Widersprüche zu höheren Einsichten. „Das Wahre ist das Ganze\" – Erkenntnis ist für Hegel ein historischer, sich entwickelnder Prozess.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "nietzsche", "title": "Nietzsche", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Friedrich Nietzsche</b> (1844–1900) kritisierte radikal die abendländische Moral und <a class=\"ilink\" data-s=\"ueberblick-teilgebiete\">Metaphysik</a>. Seine Formel „<b>Gott ist tot</b>\" diagnostiziert den Verlust verbindlicher Werte (Nihilismus), den der Mensch schöpferisch überwinden müsse.</p>\n<p>Zentrale Begriffe sind der <b>Wille zur Macht</b>, der <b>Übermensch</b> als selbstschöpferisches Ideal und die <b>ewige Wiederkehr</b> als Prüfstein der Lebensbejahung. Sein aphoristischer Stil war enorm wirkungsmächtig – und wurde oft missdeutet.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a> und <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a>.</p>", "rel": []}, {"slug": "wittgenstein", "title": "Wittgenstein", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Ludwig Wittgenstein</b> (1889–1951) prägte die Philosophie des 20. Jahrhunderts in zwei Phasen. Im frühen „Tractatus\" vertritt er eine <b>Abbildtheorie</b> der Sprache und schließt: „Wovon man nicht sprechen kann, darüber muss man schweigen.\"</p>\n<p>Der späte Wittgenstein („Philosophische Untersuchungen\") verwirft das: Bedeutung entsteht im <b>Gebrauch</b>, in <b>Sprachspielen</b> und Lebensformen. Viele philosophische Probleme seien Verwirrungen, die durch das Missverstehen der Sprache entstehen.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "hannah-arendt", "title": "Hannah Arendt", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Hannah Arendt</b> (1906–1975) war eine politische Denkerin. In „Vita activa\" unterscheidet sie <b>Arbeiten, Herstellen und Handeln</b>; das <b>Handeln</b> – gemeinsames Tun im öffentlichen Raum – macht den Menschen politisch.</p>\n<p>Bekannt wurde ihr Begriff der <b>Banalität des Bösen</b> (im Eichmann-Bericht): Großes Unrecht entsteht oft nicht durch dämonische Täter, sondern durch gedankenlose Mitläufer. Arendt analysierte zudem die Wurzeln des Totalitarismus.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "camus", "title": "Camus", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Albert Camus</b> (1913–1960) gehört zum Umkreis des <a class=\"ilink\" data-s=\"20-jahrhundert\">Existenzialismus</a> und entwickelte die Philosophie des <b>Absurden</b>: Der Mensch sucht Sinn in einer Welt, die ihm keinen liefert – aus diesem Widerspruch entsteht das Absurde.</p>\n<p>In „Der Mythos des Sisyphos\" lautet die Antwort nicht Resignation, sondern <b>Auflehnung</b>: Sisyphos, der ewig den Stein rollt, sei „als ein glücklicher Mensch vorzustellen\". Camus plädiert für ein hellsichtiges, trotziges Ja zum Leben.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a> und <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a>.</p>", "rel": []}, {"slug": "hayek", "title": "Hayek", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Friedrich August von Hayek</b> (1899–1992), Ökonom und Sozialphilosoph, erhielt 1974 den Wirtschaftsnobelpreis. Sein zentrales Argument: <b>Wissen ist verteilt</b> – kein zentraler Planer kann das in einer Gesellschaft verstreute Wissen bündeln. <b>Preise</b> fungieren als dezentraler Informationsmechanismus.</p>\n<p>In „Der Weg zur Knechtschaft\" warnt er vor zentraler Planwirtschaft als Gefahr für die Freiheit. Hayek betont <b>spontane Ordnung</b>: funktionierende Institutionen (Sprache, Markt, Recht) entstehen oft, ohne bewusst entworfen zu sein.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "nozick", "title": "Nozick", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Robert Nozick</b> (1938–2002) ist ein Hauptvertreter des <b>Libertarismus</b>. In „Anarchie, Staat und Utopia\" (1974) – einer direkten Antwort auf Rawls – verteidigt er den <b>Minimalstaat</b>, der nur Schutz von Leben, Freiheit und Eigentum garantiert.</p>\n<p>Seine <b>Anspruchstheorie</b> der Gerechtigkeit fragt nicht nach Verteilungsmustern, sondern danach, ob Besitz rechtmäßig erworben und übertragen wurde. Umverteilung durch Steuern kritisiert er als Eingriff in individuelle Rechte.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "j-s-mill", "title": "J. S. Mill", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>John Stuart Mill</b> (1806–1873) ist ein Hauptvertreter des <b>Utilitarismus</b>: Richtig ist, was das größte Glück der größten Zahl fördert. Anders als Bentham unterscheidet Mill <b>qualitativ</b> höhere und niedere Freuden.</p>\n<p>In „On Liberty\" begründet er das <b>Schadensprinzip</b>: Der Staat darf die Freiheit des Einzelnen nur einschränken, um Schaden an anderen zu verhindern. Mill ist zudem ein früher Verfechter der Meinungsfreiheit und der Rechte der Frauen.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "tocqueville", "title": "Tocqueville", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Alexis de Tocqueville</b> (1805–1859) analysierte in „<b>Über die Demokratie in Amerika</b>\" die aufkommende demokratische Gesellschaft. Er bewunderte ihre Gleichheit und das rege Vereinsleben, warnte aber vor Gefahren.</p>\n<p>Berühmt ist seine Sorge vor der „<b>Tyrannei der Mehrheit</b>\" und vor einem milden, bevormundenden Despotismus, der die Bürger entmündigt. Zivilgesellschaftliche Assoziationen sah er als Schutz der Freiheit.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "veblen", "title": "Veblen", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Thorstein Veblen</b> (1857–1929), Ökonom und Soziologe, prägte in „Theorie der feinen Leute\" den Begriff <b>demonstrativer Konsum</b> (conspicuous consumption): Güter werden auch gekauft, um <b>Status</b> zu zeigen, nicht nur zum Gebrauch.</p>\n<p>Daraus folgt das Phänomen der <b>Veblen-Güter</b>, deren Nachfrage mit dem Preis sogar <i>steigen</i> kann, weil der hohe Preis selbst das Prestige ausmacht.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "michael-sandel", "title": "Michael Sandel", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Michael Sandel</b> (geb. 1953) ist ein US-Philosoph und prominenter Vertreter des <b>Kommunitarismus</b>. Er kritisiert die liberale Vorstellung eines „ungebundenen Selbst\" und betont, dass Identität und Gerechtigkeit in <b>Gemeinschaften</b> und gemeinsamen Werten verankert sind.</p>\n<p>In Büchern wie „Gerechtigkeit\" und „Was man für Geld nicht kaufen kann\" warnt er vor der Ausbreitung von <b>Marktlogik</b> in Bereiche, die ihr nicht entsprechen (Bildung, Bürgerpflichten), und fragt nach dem Gemeinwohl.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "putnam-sozialkapital", "title": "Putnam (Sozialkapital)", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Robert D. Putnam</b> (geb. 1941) ist Politikwissenschaftler. Mit „<b>Bowling Alone</b>\" prägte er die Debatte um <b>Sozialkapital</b> – den Wert von Netzwerken, Vertrauen und Gegenseitigkeit in einer Gesellschaft.</p>\n<p>Er unterscheidet <b>bindendes</b> (innerhalb einer Gruppe) und <b>brückenbildendes</b> Sozialkapital (zwischen Gruppen) und diagnostiziert einen Rückgang bürgerschaftlichen Engagements in modernen Gesellschaften.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "byung-chul-han", "title": "Byung-Chul Han", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Byung-Chul Han</b> (geb. 1959) ist ein in Deutschland lehrender Kulturphilosoph. In „<b>Müdigkeitsgesellschaft</b>\" beschreibt er den Wandel von der Disziplinar- zur <b>Leistungsgesellschaft</b>: Wir beuten uns selbst aus, weil wir glauben, frei und unbegrenzt optimierbar zu sein.</p>\n<p>Folgen seien Erschöpfung, Burnout und Depression. Han kritisiert zudem die Auflösung von Distanz, Ritual und Kontemplation in einer transparenz- und beschleunigungsgetriebenen Kultur.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "hartmut-rosa", "title": "Hartmut Rosa", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Hartmut Rosa</b> (geb. 1965) ist ein deutscher Soziologe. Seine Diagnose der Moderne ist die <b>soziale Beschleunigung</b>: technischer, sozialer und Lebenstempo-Wandel verdichten sich, was zu Entfremdung führen kann.</p>\n<p>Als Gegenbegriff entwickelt er die <b>Resonanz</b>: eine gelingende, antwortende Beziehung zur Welt (zu Menschen, Dingen, Natur). Ein gutes Leben misst sich für Rosa nicht an Ressourcen, sondern an gelingenden Resonanzachsen.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "viktor-frankl", "title": "Viktor Frankl", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Viktor Frankl</b> (1905–1997), Wiener Psychiater und KZ-Überlebender, begründete die <b>Logotherapie</b> („dritte Wiener Schule\"). Ihr Kern: Der stärkste Antrieb des Menschen ist der <b>Wille zum Sinn</b>.</p>\n<p>In „… trotzdem Ja zum Leben sagen\" zeigt Frankl, dass Menschen selbst im Leid einen Sinn finden können, indem sie eine Haltung dazu wählen – die „letzte der menschlichen Freiheiten\" sei die Wahl der eigenen Einstellung.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "c-s-lewis", "title": "C. S. Lewis", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>C. S. Lewis</b> (1898–1963), Literaturwissenschaftler in Oxford/Cambridge, war ein einflussreicher <b>christlicher Denker</b> und Apologet. In „Pardon, ich bin Christ\" (Mere Christianity) argumentiert er u. a. mit dem <b>moralischen Argument</b>: das universelle Empfinden für Recht und Unrecht verweise auf eine objektive Grundlage.</p>\n<p>Bekannt ist auch sein „Lügner-Wahnsinniger-Herr\"-Trilemma sowie sein literarisches Werk (Narnia). Lewis verband intellektuelle Strenge mit allgemein verständlicher Sprache.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "surowiecki", "title": "Surowiecki", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>James Surowiecki</b> prägte mit „The Wisdom of Crowds\" (2004) die Idee der <b>Schwarmintelligenz</b>: Unter bestimmten Bedingungen schätzt eine vielfältige Gruppe besser als einzelne Experten.</p>\n<p>Voraussetzungen sind <b>Diversität</b> der Meinungen, <b>Unabhängigkeit</b> der Urteile, <b>Dezentralität</b> und ein Mechanismus zur <b>Aggregation</b>. Fehlen sie – etwa durch Herdenverhalten – kippt die kollektive Klugheit in kollektiven Irrtum.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "nassim-taleb", "title": "Nassim Taleb", "crumb": "Denker › Neuzeit & Moderne", "body": "<p><b>Nassim Nicholas Taleb</b> (geb. 1960) ist Statistiker und Essayist. In seiner „Incerto\"-Reihe untersucht er den Umgang mit <b>Unsicherheit</b> und Zufall. Sein Begriff <b>Schwarzer Schwan</b> bezeichnet seltene, kaum vorhersehbare Ereignisse mit massiven Folgen, die im Nachhinein scheinbar erklärbar wirken.</p>\n<p>Zentral ist <b>Antifragilität</b>: Manche Systeme werden durch Stress, Volatilität und Fehler nicht nur nicht geschädigt, sondern sogar stärker. Taleb plädiert für Robustheit, „skin in the game\" (eigene Haftung) und Demut gegenüber dem Nichtwissen.</p><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"sokrates-platon\">Sokrates/Platon</a>, <a class=\"ilink\" data-s=\"aristoteles\">Aristoteles</a> und <a class=\"ilink\" data-s=\"epikur\">Epikur</a>.</p>", "rel": []}, {"slug": "quellen", "title": "Quellen & Weiterlesen", "crumb": "Service", "body": "<p class=\"lead\">Wo du dein Wissen vertiefen kannst:</p>\n<ul><li><b>Stanford Encyclopedia of Philosophy</b> – plato.stanford.edu, peer-reviewed (englisch).</li>\n<li><b>Metzler Lexikon Philosophie</b> – deutsches Nachschlagewerk zu Begriffen und Denkern.</li>\n<li><b>Reclam – Grundwissen Philosophie</b> – kompakte Einführungen.</li>\n<li><b>zeno.org</b> – Volltexte philosophischer Primärwerke auf Deutsch.</li>\n<li><b>Philosophie Magazin</b> – philomag.de, aktuelle Debatten.</li></ul><p>Eng verwandt sind die Artikel <a class=\"ilink\" data-s=\"ueberblick-teilgebiete\">Überblick & Teilgebiete</a>, <a class=\"ilink\" data-s=\"logik-argumentation\">Logik & Argumentation</a> und <a class=\"ilink\" data-s=\"antike\">Antike</a>.</p>", "rel": []}], "tree": [{"name": "Grundlagen", "ic": "🗺️", "slugs": ["ueberblick-teilgebiete", "logik-argumentation"], "subs": []}, {"name": "Epochen & Strömungen", "ic": "🏛️", "slugs": ["antike", "mittelalter", "rationalismus-empirismus", "kant", "19-jahrhundert", "20-jahrhundert", "politische-philosophie"], "subs": []}, {"name": "Denker", "ic": "🧠", "slugs": [], "subs": [{"name": "Antike", "slugs": ["sokrates-platon", "aristoteles", "epikur", "stoa", "epiktet-stoa", "marc-aurel"]}, {"name": "Neuzeit & Moderne", "slugs": ["spinoza", "hegel", "nietzsche", "wittgenstein", "hannah-arendt", "camus", "hayek", "nozick", "j-s-mill", "tocqueville", "veblen", "michael-sandel", "putnam-sozialkapital", "byung-chul-han", "hartmut-rosa", "viktor-frankl", "c-s-lewis", "surowiecki", "nassim-taleb"]}]}, {"name": "Service", "ic": "📚", "slugs": ["quellen"], "subs": []}]};
var root=document.documentElement;
// ---- theme ----
function initTheme(){var p=new URLSearchParams(location.search).get('theme');var t;
  if(p==='dark'||p==='light')t=p;else{try{t=localStorage.getItem('nsw_theme')||'light'}catch(e){t='light'}}
  applyTheme(t);}
function applyTheme(t){if(t==='dark'){root.setAttribute('data-theme','dark');}else{root.removeAttribute('data-theme');}
  document.getElementById('themebtn').textContent=(t==='dark')?'☀️':'🌙';curTheme=t;
  // update any embedded aroma iframe
  var af=document.querySelector('.aromaframe');if(af){var u=af.getAttribute('data-base');af.src=u+'?theme='+t;}}
var curTheme='light';
document.getElementById('themebtn').onclick=function(){var t=curTheme==='dark'?'light':'dark';try{localStorage.setItem('nsw_theme',t)}catch(e){}applyTheme(t);};
// ---- index ----
var BYSLUG={};APP.articles.forEach(function(a){BYSLUG[a.slug]=a;});
document.title=APP.title+' – Nachschlagewerk';
document.getElementById('brand').innerHTML=APP.brand;
document.getElementById('logo').textContent=APP.ic;
root.style.setProperty('--brand',APP.color);
var meta=document.createElement('meta');meta.name='theme-color';meta.content=APP.color;document.head.appendChild(meta);
// ---- sidebar ----
function buildSidebar(){
  var side=document.getElementById('side');side.innerHTML='';
  APP.tree.forEach(function(c,ci){
    var cat=document.createElement('div');cat.className='cat'+(ci>0?' collapsed':'');
    var btn=document.createElement('button');btn.className='catname';btn.innerHTML=(c.ic?c.ic+' ':'')+c.name+'<span class="tw">▾</span>';
    btn.onclick=function(){cat.classList.toggle('collapsed');};
    cat.appendChild(btn);
    var ch=document.createElement('div');ch.className='children';
    (c.slugs||[]).forEach(function(s){ch.appendChild(mkA(s));});
    (c.subs||[]).forEach(function(sub){
      var sn=document.createElement('div');sn.className='subname';sn.textContent=sub.name;ch.appendChild(sn);
      sub.slugs.forEach(function(s){ch.appendChild(mkA(s));});
    });
    cat.appendChild(ch);side.appendChild(cat);
  });
}
function mkA(slug){var a=BYSLUG[slug];var b=document.createElement('button');b.className='alink';b.dataset.s=slug;b.textContent=a?a.title:slug;b.onclick=function(){go(slug);closeSide();};return b;}
// ---- article render ----
function go(slug){
  var a=BYSLUG[slug];if(!a){a=APP.articles[0];slug=a.slug;}
  if(location.hash!=='#'+slug)history.replaceState(null,'','#'+slug);
  document.querySelectorAll('.alink').forEach(function(x){x.classList.toggle('active',x.dataset.s===slug);});
  // expand the cat containing it
  var m=document.getElementById('main');
  var sa="";
  m.innerHTML='<div class="crumb">'+a.crumb+'</div><article class="art"><h1>'+a.title+'</h1>'+a.body+sa+'</article>';
  m.scrollTop=0;window.scrollTo(0,0);
  // wire internal links
  m.querySelectorAll('a.ilink').forEach(function(l){l.onclick=function(e){e.preventDefault();go(l.dataset.s);};});
  m.querySelectorAll('.seealso a').forEach(function(l){l.onclick=function(e){e.preventDefault();go(l.dataset.s);};});
}
function relatedChips(slug){
  var a=BYSLUG[slug];if(!a.rel||!a.rel.length)return '';
  var c=a.rel.map(function(s){var t=BYSLUG[s];return t?'<a data-s="'+s+'">'+t.title+'</a>':'';}).join('');
  return '<div class="seealso"><b>Siehe auch</b><div class="chips">'+c+'</div></div>';
}
// ---- search ----
function strip(s){return (s||'').replace(/<[^>]+>/g,' ');}
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.trim().toLowerCase();
  if(!q){var h=location.hash.slice(1);go(BYSLUG[h]?h:APP.articles[0].slug);return;}
  var hits=APP.articles.filter(function(a){return (a.title+' '+strip(a.body)).toLowerCase().indexOf(q)>-1;}).slice(0,40);
  var m=document.getElementById('main');
  m.innerHTML='<div class="crumb">Suche</div><h1 class="art" style="font-size:24px;margin:0 0 14px">'+hits.length+' Treffer für „'+e.target.value+'"</h1><div class="results"></div>';
  var box=m.querySelector('.results');
  hits.forEach(function(a){var b=document.createElement('button');b.className='alink';b.dataset.s=a.slug;b.textContent=a.title;b.onclick=function(){go(a.slug);};box.appendChild(b);});
  if(!hits.length)m.querySelector('.results').innerHTML='<p class="muted">Nichts gefunden.</p>';
});
// ---- mobile ----
function closeSide(){document.getElementById('side').classList.remove('open');document.getElementById('backdrop').classList.remove('open');}
document.getElementById('menubtn').onclick=function(){document.getElementById('side').classList.toggle('open');document.getElementById('backdrop').classList.toggle('open');};
document.getElementById('backdrop').onclick=closeSide;
// ---- init ----
document.getElementById('logo').onclick=function(){go(APP.articles[0].slug);closeSide();};
initTheme();buildSidebar();
var start=location.hash.slice(1);go(BYSLUG[start]?start:APP.articles[0].slug);
window.addEventListener('hashchange',function(){var h=location.hash.slice(1);if(h&&BYSLUG[h])go(h);});
</script>
</body>
</html>
